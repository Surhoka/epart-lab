<div class="w-full animate-fade-in" x-data="landingPageAdmin">
    <!-- Header -->
    <header class="mb-8 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Landing Page Products</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Kelola produk yang ditampilkan di halaman depan website publik.</p>
        </div>
        <button @click="openAddModal()"
            class="flex items-center gap-2 rounded-xl bg-brand-500 px-5 py-2.5 text-sm font-bold text-white shadow-lg shadow-brand-500/20 transition-all hover:bg-brand-600 active:scale-95">
            <span class="w-4 h-4" x-icon="'plus'"></span>
            Tambah Produk
        </button>
    </header>

    <!-- Stats Row (Optional) -->
    <div class="mb-8 grid grid-cols-1 gap-4 sm:grid-cols-3">
        <div class="rounded-2xl border border-gray-100 bg-white p-6 dark:border-gray-800 dark:bg-gray-900">
            <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Total Produk</p>
            <p class="mt-2 text-3xl font-bold text-gray-900 dark:text-white" x-text="products.length"></p>
        </div>
        <div class="rounded-2xl border border-gray-100 bg-white p-6 dark:border-gray-800 dark:bg-gray-900">
            <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Produk Aktif</p>
            <p class="mt-2 text-3xl font-bold text-green-600" x-text="products.filter(p => p.active).length"></p>
        </div>
        <div class="rounded-2xl border border-gray-100 bg-white p-6 dark:border-gray-800 dark:bg-gray-900">
            <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Unggulan (Featured)</p>
            <p class="mt-2 text-3xl font-bold text-orange-500" x-text="products.filter(p => p.featured).length"></p>
        </div>
    </div>

    <!-- Product Table -->
    <div class="overflow-hidden rounded-2xl border border-gray-100 bg-white shadow-sm dark:border-gray-800 dark:bg-gray-900">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-xs font-bold uppercase tracking-wider text-gray-500 dark:bg-gray-800/50 dark:text-gray-400">
                    <tr>
                        <th class="px-6 py-4">Produk</th>
                        <th class="px-6 py-4">Kategori</th>
                        <th class="px-6 py-4">Harga</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4 text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                    <template x-for="product in products" :key="product.id">
                        <tr class="group transition-colors hover:bg-gray-50/50 dark:hover:bg-gray-800/30">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-4">
                                    <div class="h-12 w-12 shrink-0 overflow-hidden rounded-lg bg-gray-100 dark:bg-gray-800">
                                        <template x-if="product.imageUrl">
                                            <img :src="product.imageUrl" class="h-full w-full object-cover" :alt="product.title">
                                        </template>
                                        <template x-if="!product.imageUrl">
                                            <div class="flex h-full w-full items-center justify-center text-gray-400">
                                                <span class="w-6 h-6" x-icon="'image'"></span>
                                            </div>
                                        </template>
                                    </div>
                                    <div>
                                        <div class="font-bold text-gray-900 dark:text-white" x-text="product.title"></div>
                                        <div class="text-xs text-gray-500 dark:text-gray-400" x-text="product.subtitle || 'No subtitle'"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="rounded-lg bg-gray-100 px-2.5 py-1 text-xs font-medium text-gray-600 dark:bg-gray-800 dark:text-gray-400" x-text="product.category || 'Uncategorized'"></span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm font-bold text-gray-900 dark:text-white" x-text="window.app.formatPrice(product.price)"></div>
                                <template x-if="product.originalPrice > 0">
                                    <div class="text-[10px] text-gray-400 line-through" x-text="window.app.formatPrice(product.originalPrice)"></div>
                                </template>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col gap-1.5">
                                    <button @click="toggleActive(product)"
                                        :class="product.active ? 'bg-green-100 text-green-700 dark:bg-green-900/20 dark:text-green-400' : 'bg-gray-100 text-gray-500 dark:bg-gray-800 dark:text-gray-400'"
                                        class="inline-flex w-fit items-center gap-1.5 rounded-full px-2.5 py-1 text-[10px] font-bold transition-all">
                                        <span class="h-1.5 w-1.5 rounded-full" :class="product.active ? 'bg-green-500' : 'bg-gray-400'"></span>
                                        <span x-text="product.active ? 'AKTIF' : 'NON-AKTIF'"></span>
                                    </button>
                                    <template x-if="product.featured">
                                        <span class="inline-flex w-fit items-center gap-1.5 rounded-full bg-orange-100 px-2.5 py-1 text-[10px] font-bold text-orange-700 dark:bg-orange-900/20 dark:text-orange-400">
                                            <span class="w-3 h-3" x-icon="'star'"></span>
                                            FEATURED
                                        </span>
                                    </template>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <button @click="editProduct(product)"
                                        class="flex h-8 w-8 items-center justify-center rounded-lg border border-gray-200 text-gray-500 transition-all hover:border-brand-500 hover:text-brand-500 dark:border-gray-700 dark:text-gray-400">
                                        <span class="w-4 h-4" x-icon="'edit'"></span>
                                    </button>
                                    <button @click="deleteProduct(product.id)"
                                        class="flex h-8 w-8 items-center justify-center rounded-lg border border-gray-200 text-gray-500 transition-all hover:border-red-500 hover:text-red-500 dark:border-gray-700 dark:text-gray-400">
                                        <span class="w-4 h-4" x-icon="'trash'"></span>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- Empty State -->
        <template x-if="!loading && products.length === 0">
            <div class="flex flex-col items-center justify-center py-20">
                <div class="flex h-20 w-20 items-center justify-center rounded-full bg-gray-50 dark:bg-gray-800">
                    <span class="w-10 h-10 text-gray-300" x-icon="'layout'"></span>
                </div>
                <h3 class="mt-4 text-lg font-bold text-gray-900 dark:text-white">Belum ada produk</h3>
                <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Mulai dengan menambahkan produk pertama Anda.</p>
                <button @click="openAddModal()" class="mt-6 rounded-xl bg-brand-500 px-6 py-2.5 text-sm font-bold text-white transition-all hover:bg-brand-600">
                    Tambah Produk Sekarang
                </button>
            </div>
        </template>

        <!-- Loading State -->
        <template x-if="loading">
            <div class="flex flex-col items-center justify-center py-20">
                <div class="h-10 w-10 animate-spin rounded-full border-4 border-brand-500 border-t-transparent"></div>
                <p class="mt-4 text-sm font-medium text-gray-500 dark:text-gray-400">Memuat data...</p>
            </div>
        </template>
    </div>

    <!-- Modal Add/Edit -->
    <div x-show="modalOpen" :class="{ 'show': modalOpen }" x-trap="modalOpen" x-transition
        class="fixed inset-0 flex justify-center items-center p-4 overflow-hidden z-[99999] modal" x-cloak>
        <div class="fixed inset-0 h-full w-full bg-gray-900/40 backdrop-blur-xl transition-opacity duration-300"
            @click="modalOpen = false"></div>
        <div class="modal-dialog relative w-full max-w-2xl max-h-[90vh] flex flex-col rounded-3xl bg-white dark:bg-gray-900 p-8 shadow-2xl transition-all duration-300">
            <!-- Modal Header (Sticky) -->
            <header class="flex items-start justify-between mb-6 shrink-0">
                <div>
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white" x-text="editMode ? 'Edit Produk' : 'Tambah Produk Baru'"></h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Lengkapi informasi produk di bawah ini.</p>
                </div>
                <button @click="modalOpen = false"
                    class="absolute right-6 top-6 flex h-10 w-10 items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-500 transition-all hover:scale-110 dark:bg-gray-800 dark:hover:bg-gray-700">
                    <span class="w-6 h-6 block" x-icon="'close'"></span>
                </button>
            </header>

            <div class="flex flex-col modal-content custom-scrollbar overflow-y-auto pr-2 min-h-0">
                <form @submit.prevent="saveProduct()" id="productForm" class="space-y-6">
                    <!-- Grid Layout for form -->
                    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
                        <div class="md:col-span-2">
                            <label class="mb-2 block text-sm font-bold text-gray-700 dark:text-gray-300">Nama Produk</label>
                            <input type="text" x-model="formData.title" required
                                class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-800 dark:text-white"
                                placeholder="Contoh: Brake Pad Set Front">
                        </div>

                        <div>
                            <label class="mb-2 block text-sm font-bold text-gray-700 dark:text-gray-300">Subtitle</label>
                            <input type="text" x-model="formData.subtitle"
                                class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-800 dark:text-white"
                                placeholder="Contoh: Premium Quality OEM">
                        </div>

                        <div>
                            <label class="mb-2 block text-sm font-bold text-gray-700 dark:text-gray-300">Kategori</label>
                            <input type="text" x-model="formData.category"
                                class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-800 dark:text-white"
                                placeholder="Contoh: Brakes, Engine, Suspension">
                        </div>

                        <div>
                            <label class="mb-2 block text-sm font-bold text-gray-700 dark:text-gray-300">Harga Jual</label>
                            <input type="number" x-model.number="formData.price" required
                                class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-800 dark:text-white">
                        </div>

                        <div>
                            <label class="mb-2 block text-sm font-bold text-gray-700 dark:text-gray-300">Harga Coret (Optional)</label>
                            <input type="number" x-model.number="formData.originalPrice"
                                class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-800 dark:text-white">
                        </div>

                        <div class="md:col-span-2">
                            <label class="mb-2 block text-sm font-bold text-gray-700 dark:text-gray-300">Image URL</label>
                            <input type="text" x-model="formData.imageUrl"
                                class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-800 dark:text-white"
                                placeholder="https://example.com/image.jpg">
                        </div>

                        <div class="md:col-span-2">
                            <label class="mb-2 block text-sm font-bold text-gray-700 dark:text-gray-300">Deskripsi</label>
                            <textarea x-model="formData.description" rows="3"
                                class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-800 dark:text-white"
                                placeholder="Detail produk..."></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4 md:col-span-2">
                            <div class="flex items-center gap-2">
                                <input type="checkbox" x-model="formData.featured" id="chk-featured" class="h-4 w-4 rounded text-brand-500 focus:ring-brand-500">
                                <label for="chk-featured" class="text-sm font-bold text-gray-700 dark:text-gray-300">Featured (Unggulan)</label>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" x-model="formData.active" id="chk-active" class="h-4 w-4 rounded text-brand-500 focus:ring-brand-500">
                                <label for="chk-active" class="text-sm font-bold text-gray-700 dark:text-gray-300">Aktif</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <footer class="mt-8 flex items-center justify-end gap-3 border-t border-gray-100 pt-6 dark:border-gray-800 shrink-0">
                <button type="button" @click="modalOpen = false"
                    class="rounded-xl border border-gray-200 px-6 py-2.5 text-sm font-bold text-gray-700 hover:bg-gray-50 transition-all dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-800">
                    Batal
                </button>
                <button type="submit" form="productForm" :disabled="submitting"
                    class="flex items-center gap-2 rounded-xl bg-brand-500 px-8 py-2.5 text-sm font-bold text-white shadow-xl shadow-brand-500/25 transition-all hover:bg-brand-600 hover:scale-[1.02] active:scale-95 disabled:opacity-50">
                    <template x-if="submitting">
                        <span class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
                    </template>
                    <span x-text="editMode ? 'Simpan Perubahan' : 'Tambah Produk'"></span>
                </button>
            </footer>
        </div>
    </div>
</div>
