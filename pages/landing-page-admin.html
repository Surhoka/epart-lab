<div class="w-full animate-fade-in" x-data="landingPageAdmin">
    <!-- Header -->
    <header class="mb-8 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-black text-gray-900 dark:text-white">Sales Page Configuration</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Atur konten untuk halaman penjualan produk tunggal Anda.</p>
        </div>
        <div class="flex items-center gap-3">
            <template x-if="loading">
                <span class="flex items-center gap-2 text-xs font-bold text-gray-400">
                    <span class="h-3 w-3 animate-spin rounded-full border-2 border-gray-300 border-t-transparent"></span>
                    Sinkronisasi...
                </span>
            </template>
            <button @click="saveProduct()" :disabled="submitting || loading"
                class="flex items-center gap-2 rounded-xl bg-brand-500 px-6 py-2.5 text-sm font-black text-white shadow-xl shadow-brand-500/20 transition-all hover:bg-brand-600 active:scale-95 disabled:opacity-50">
                <template x-if="submitting">
                    <span class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
                </template>
                <span class="w-4 h-4" x-icon="'save'"></span>
                Simpan Perubahan
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Main Form -->
        <div class="lg:col-span-2 space-y-6">
            <div class="rounded-[32px] border border-gray-100 bg-white p-8 shadow-sm dark:border-gray-800 dark:bg-gray-900">
                <h2 class="mb-6 text-lg font-black text-gray-900 dark:text-white flex items-center gap-3">
                    <span class="p-2 rounded-xl bg-brand-50 dark:bg-brand-900/20 text-brand-600">
                        <span class="w-5 h-5" x-icon="'edit-3'"></span>
                    </span>
                    Informasi Produk
                </h2>

                <div class="space-y-6">
                    <div>
                        <label class="mb-2 block text-xs font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Judul Utama (Nama Produk)</label>
                        <input type="text" x-model="formData.title"
                            class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-5 py-4 text-base font-bold transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-gray-800 dark:text-white"
                            placeholder="Contoh: Super Brake Pad XTR">
                    </div>

                    <div>
                        <label class="mb-2 block text-xs font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Slogan / Subtitle</label>
                        <input type="text" x-model="formData.subtitle"
                            class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-5 py-4 text-sm font-bold transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-gray-800 dark:text-white"
                            placeholder="Contoh: Performa Pengereman Maksimal Tanpa Suara">
                    </div>

                    <div>
                        <label class="mb-2 block text-xs font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Deskripsi Lengkap</label>
                        <textarea x-model="formData.description" rows="6"
                            class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-5 py-4 text-sm leading-relaxed transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-gray-800 dark:text-white"
                            placeholder="Jelaskan keunggulan dan spesifikasi produk Anda secara detail..."></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="mb-2 block text-xs font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Harga Jual (IDR)</label>
                            <input type="number" x-model.number="formData.price"
                                class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-5 py-4 text-lg font-black text-brand-600 transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-gray-800">
                        </div>
                        <div>
                            <label class="mb-2 block text-xs font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Harga Coret / Asli (IDR)</label>
                            <input type="number" x-model.number="formData.originalPrice"
                                class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-5 py-4 text-lg font-bold text-gray-400 line-through transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-gray-800">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar Options -->
        <div class="space-y-6">
            <!-- Media & Visualization -->
            <div class="rounded-[32px] border border-gray-100 bg-white p-8 shadow-sm dark:border-gray-800 dark:bg-gray-900">
                <h2 class="mb-6 text-lg font-black text-gray-900 dark:text-white flex items-center gap-3">
                    <span class="p-2 rounded-xl bg-blue-50 dark:bg-blue-900/20 text-blue-600">
                        <span class="w-5 h-5" x-icon="'image'"></span>
                    </span>
                    Media Utama
                </h2>
                
                <div class="space-y-6">
                    <div class="aspect-square w-full overflow-hidden rounded-3xl bg-gray-100 dark:bg-gray-800 group relative">
                        <template x-if="formData.imageUrl">
                            <img :src="formData.imageUrl" class="h-full w-full object-contain p-4 transition-transform group-hover:scale-110">
                        </template>
                        <template x-if="!formData.imageUrl">
                            <div class="flex h-full w-full flex-col items-center justify-center text-gray-400">
                                <span class="w-12 h-12 mb-2" x-icon="'image'"></span>
                                <span class="text-[10px] font-bold uppercase tracking-widest">No Image Preview</span>
                            </div>
                        </template>
                    </div>

                    <div>
                        <label class="mb-2 block text-xs font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Image URL</label>
                        <input type="text" x-model="formData.imageUrl"
                            class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-4 py-3 text-xs transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-gray-800 dark:text-white"
                            placeholder="https://example.com/product.jpg">
                    </div>
                </div>
            </div>

            <!-- Promotion & Tags -->
            <div class="rounded-[32px] border border-gray-100 bg-white p-8 shadow-sm dark:border-gray-800 dark:bg-gray-900">
                <h2 class="mb-6 text-lg font-black text-gray-900 dark:text-white flex items-center gap-3">
                    <span class="p-2 rounded-xl bg-orange-50 dark:bg-orange-900/20 text-orange-600">
                        <span class="w-5 h-5" x-icon="'tag'"></span>
                    </span>
                    Pengaturan
                </h2>

                <div class="space-y-6">
                    <div>
                        <label class="mb-2 block text-xs font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">Nama Kategori</label>
                        <input type="text" x-model="formData.category"
                            class="w-full rounded-2xl border border-gray-100 bg-gray-50 px-4 py-3 text-xs font-bold transition-all focus:bg-white focus:ring-4 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-gray-800 dark:text-white"
                            placeholder="Contoh: Spareparts">
                    </div>

                    <div class="space-y-4">
                        <label class="relative flex cursor-pointer items-center gap-3 group">
                            <input type="checkbox" x-model="formData.active" class="peer sr-only">
                            <div class="h-6 w-11 rounded-full bg-gray-200 after:absolute after:left-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all peer-checked:bg-brand-600 peer-checked:after:translate-x-full dark:bg-gray-700"></div>
                            <span class="text-sm font-bold text-gray-700 dark:text-gray-300 group-hover:text-brand-600">Publikasikan Halaman</span>
                        </label>

                        <div class="p-4 rounded-2xl bg-brand-50/50 dark:bg-brand-900/10 border border-brand-100 dark:border-brand-900/30">
                            <p class="text-[10px] leading-relaxed text-brand-700 dark:text-brand-400">
                                <strong>Tips:</strong> Gunakan gambar transparan (PNG) untuk tampilan hero yang lebih premium dan imersif.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
