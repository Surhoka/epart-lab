<div id="home-admin-page-container" class="w-full animate-fade-in" x-data="{ activeTab: 'hero' }">
    <!-- Header -->
    <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Public Content Manager</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Manage public page content: Hero Slider,
                Categories, and Featured Products.</p>
        </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav-container tab-nav-borderless mb-6">
        <button @click="activeTab = 'hero'" :class="{ 'active': activeTab === 'hero' }" class="tab-nav-btn">
            <span class="w-4 h-4" x-icon="'image'"></span> Hero Slider
        </button>
        <button @click="activeTab = 'categories'" :class="{ 'active': activeTab === 'categories' }" class="tab-nav-btn">
            <span class="w-4 h-4" x-icon="'layers'"></span> Categories
        </button>
    </div>

    <!-- ============================================================ -->
    <!-- TAB: HERO SLIDER -->
    <!-- ============================================================ -->
    <div x-show="activeTab === 'hero'" x-data="heroManager" x-init="init()">
        <input type="file" x-ref="heroImageInput" class="hidden" accept="image/*" @change="handleImageUpload($event)">

        <!-- Toolbar -->
        <div class="mb-4 flex items-center justify-between">
            <p class="text-sm text-gray-500 dark:text-gray-400">
                <span x-text="slides.length"></span> slides registered
            </p>
            <div class="flex gap-2">
                <button @click="fetchSlides()" class="btn btn-outline">
                    <span class="w-4 h-4" :class="isLoading ? 'animate-spin' : ''" x-icon="'refresh'"></span> Refresh
                </button>
                <button @click="openAddModal()" class="btn btn-primary">
                    <span class="w-4 h-4" x-icon="'plus'"></span> Add Slide
                </button>
            </div>
        </div>

        <!-- Loading -->
        <template x-if="isLoading">
            <div class="flex items-center justify-center py-16">
                <span class="h-8 w-8 animate-spin rounded-full border-4 border-brand-500 border-t-transparent"></span>
            </div>
        </template>

        <!-- Slides Grid -->
        <template x-if="!isLoading">
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                <template x-for="slide in slides" :key="slide.id">
                    <div
                        class="group relative overflow-hidden rounded-lg border border-gray-100 bg-white shadow-sm dark:border-gray-800 dark:bg-gray-900">
                        <!-- Image -->
                        <div class="relative aspect-video bg-gray-100 dark:bg-gray-800 overflow-hidden">
                            <template x-if="slide.imageurl">
                                <img :src="slide.imageurl" class="h-full w-full object-cover" :alt="slide.title">
                            </template>
                            <template x-if="!slide.imageurl">
                                <div class="flex h-full items-center justify-center text-gray-300">
                                    <span class="w-10 h-10" x-icon="'image'"></span>
                                </div>
                            </template>
                            <!-- Status badge -->
                            <span class="absolute top-2 right-2 rounded-full px-2 py-0.5 text-[10px] font-bold"
                                :class="(slide.active === true || slide.active === 'TRUE') ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                                x-text="(slide.active === true || slide.active === 'TRUE') ? 'Active' : 'Inactive'"></span>
                        </div>
                        <!-- Info -->
                        <div class="p-4">
                            <h3 class="font-bold text-gray-900 dark:text-white truncate" x-text="slide.title"></h3>
                            <p class="mt-1 text-xs text-gray-500 dark:text-gray-400 truncate"
                                x-text="slide.subtitle || '—'"></p>
                            <div class="mt-3 flex items-center gap-2">
                                <button @click="editSlide(slide)" class="btn btn-outline btn-sm flex-1">
                                    Edit
                                </button>
                                <button @click="deleteSlide(slide.id)" class="btn btn-danger btn-sm">
                                    <span class="w-3.5 h-3.5" x-icon="'trash'"></span>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Empty State -->
                <template x-if="slides.length === 0">
                    <div
                        class="col-span-full flex flex-col items-center justify-center rounded-lg border-2 border-dashed border-gray-200 py-16 dark:border-gray-800">
                        <span class="w-12 h-12 text-gray-300" x-icon="'image'"></span>
                        <p class="mt-4 font-bold text-gray-500">No slides yet</p>
                        <button @click="openAddModal()" class="btn btn-primary mt-4">Add First Slide</button>
                    </div>
                </template>
            </div>
        </template>

        <!-- Modal Add/Edit Hero Slide -->
        <template x-teleport="body">
            <div x-show="showModal" :class="{ 'show': showModal }" x-trap="showModal" x-transition
                class="fixed inset-0 flex justify-center items-center p-4 overflow-hidden z-[99999] modal" x-cloak>
                <div class="fixed inset-0 h-full w-full bg-gray-900/40 backdrop-blur-xl transition-opacity duration-300"
                    @click="showModal = false"></div>

                <div
                    class="modal-dialog">
                    <!-- close btn -->
                    <button @click="showModal = false"
                        class="modal-close-btn">
                        <span class="w-6 h-6 block" x-icon="'close'"></span>
                    </button>

                    <!-- Modal Content -->
                    <div class="modal-content custom-scrollbar">
                        <div class="modal-header-sticky">
                            <h3 class="h3"
                                x-text="isEditing ? 'Edit Slide' : 'Add Slide'"></h3>
                            <p class="mt-2 text-sm text-theme-secondary">Visual configuration for the home
                                hero banner.</p>
                        </div>
                        <div class="modal-body-content gap-5">
                            <!-- Image Upload -->
                            <div>
                                <label class="form-label">Slide Image</label>
                                <div class="relative group aspect-video w-full overflow-hidden rounded-lg bg-gray-100 dark:bg-gray-800 cursor-pointer"
                                    @click="$refs.heroImageInput.click()">
                                    <template x-if="editingItem.imageurl">
                                        <img :src="editingItem.imageurl" class="h-full w-full object-cover">
                                    </template>
                                    <template x-if="!editingItem.imageurl">
                                        <div
                                            class="flex h-full flex-col items-center justify-center text-gray-300 gap-2">
                                            <span class="w-8 h-8" x-icon="'upload'"></span>
                                            <span class="text-xs font-bold">Click to upload</span>
                                        </div>
                                    </template>
                                    <div x-show="isUploading"
                                        class="absolute inset-0 flex items-center justify-center bg-white/80 dark:bg-black/80">
                                        <span
                                            class="h-6 w-6 animate-spin rounded-full border-2 border-brand-500 border-t-transparent"></span>
                                    </div>
                                </div>
                                <input type="text" x-model="editingItem.imageurl"
                                    class="form-input mt-2"
                                    placeholder="Or enter image URL">
                            </div>
                            <div>
                                <label class="form-label">Title
                                    *</label>
                                <input type="text" x-model="editingItem.title"
                                    class="form-input"
                                    placeholder="Slide title">
                            </div>
                            <div>
                                <label class="form-label">Subtitle</label>
                                <input type="text" x-model="editingItem.subtitle"
                                    class="form-input"
                                    placeholder="Support text">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="form-label">Button
                                        Text</label>
                                    <input type="text" x-model="editingItem.buttontext"
                                        class="form-input"
                                        placeholder="Shop Now">
                                </div>
                                <div>
                                    <label class="form-label">Button
                                        Link</label>
                                    <input type="text" x-model="editingItem.buttonlink"
                                        class="form-input"
                                        placeholder="#shop">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="form-label">Urutan</label>
                                    <input type="number" x-model.number="editingItem.sortorder"
                                        class="form-input">
                                </div>
                                <div class="flex items-end pb-1">
                                    <label class="flex cursor-pointer items-center gap-2">
                                        <input type="checkbox" x-model="editingItem.active" class="peer sr-only">
                                        <div
                                            class="h-6 w-11 rounded-full bg-gray-200 after:absolute after:left-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all peer-checked:bg-brand-600 peer-checked:after:translate-x-full dark:bg-gray-700 relative">
                                        </div>
                                        <span class="text-sm font-bold text-gray-700 dark:text-gray-300">Active</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Modal Footer -->
                        <footer class="modal-footer-actions">
                            <button @click="showModal = false" class="btn btn-outline flex-1">Cancel</button>
                            <button id="save-hero-btn" @click="saveSlide()" class="btn btn-primary flex-1">Save Slide</button>
                        </footer>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- ============================================================ -->
    <!-- TAB: CATEGORIES -->
    <!-- ============================================================ -->
    <div x-show="activeTab === 'categories'" x-data="categoryManager" x-init="init()">
        <input type="file" x-ref="categoryImageInput" class="hidden" accept="image/*"
            @change="handleImageUpload($event)">

        <!-- Toolbar -->
        <div class="mb-4 flex items-center justify-between">
            <p class="text-sm text-gray-500 dark:text-gray-400"><span x-text="categories.length"></span> categories
                registered</p>
            <div class="flex gap-2">
                <button @click="fetchCategories()" class="btn btn-outline">
                    <span class="w-4 h-4" :class="isLoading ? 'animate-spin' : ''" x-icon="'refresh'"></span> Refresh
                </button>
                <button @click="openAddModal()" class="btn btn-primary">
                    <span class="w-4 h-4" x-icon="'plus'"></span> Add Category
                </button>
            </div>
        </div>

        <!-- Loading -->
        <template x-if="isLoading">
            <div class="flex items-center justify-center py-16">
                <span class="h-8 w-8 animate-spin rounded-full border-4 border-brand-500 border-t-transparent"></span>
            </div>
        </template>

        <!-- Table -->
        <template x-if="!isLoading">
            <div
                class="rounded-lg border border-gray-100 bg-white dark:border-gray-800 dark:bg-gray-900 overflow-hidden">
                <table class="w-full text-sm">
                    <thead class="border-b border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-900/50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-black uppercase tracking-widest text-gray-500">
                                Category</th>
                            <th
                                class="px-4 py-3 text-left text-xs font-black uppercase tracking-widest text-gray-500 hidden sm:table-cell">
                                Slug</th>
                            <th
                                class="px-4 py-3 text-center text-xs font-black uppercase tracking-widest text-gray-500">
                                Sort Order</th>
                            <th
                                class="px-4 py-3 text-center text-xs font-black uppercase tracking-widest text-gray-500">
                                Status</th>
                            <th class="px-4 py-3 text-right text-xs font-black uppercase tracking-widest text-gray-500">
                                Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50 dark:divide-gray-800">
                        <template x-for="cat in categories" :key="cat.id">
                            <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
                                <td class="px-4 py-3">
                                    <div class="flex items-center gap-3">
                                        <template x-if="cat.imageurl">
                                            <img :src="cat.imageurl"
                                                class="h-9 w-9 rounded-lg object-cover bg-gray-100">
                                        </template>
                                        <template x-if="!cat.imageurl">
                                            <div
                                                class="flex h-9 w-9 items-center justify-center rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-400">
                                                <span class="w-4 h-4" x-icon="'layers'"></span>
                                            </div>
                                        </template>
                                        <div>
                                            <p class="font-bold text-gray-900 dark:text-white" x-text="cat.name"></p>
                                            <p class="text-xs text-gray-400 truncate max-w-[160px]"
                                                x-text="cat.description || '—'"></p>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-4 py-3 hidden sm:table-cell">
                                    <span
                                        class="rounded-lg bg-gray-100 dark:bg-gray-800 px-2 py-1 font-mono text-xs text-gray-600 dark:text-gray-400"
                                        x-text="cat.slug || '—'"></span>
                                </td>
                                <td class="px-4 py-3 text-center text-gray-500" x-text="cat.sortorder || 0"></td>
                                <td class="px-4 py-3 text-center">
                                    <span class="rounded-full px-2.5 py-1 text-[10px] font-bold"
                                        :class="(cat.active === true || cat.active === 'TRUE') ? 'bg-green-100 text-green-700 dark:bg-green-900/20 dark:text-green-400' : 'bg-gray-100 text-gray-500 dark:bg-gray-800'"
                                        x-text="(cat.active === true || cat.active === 'TRUE') ? 'Active' : 'Inactive'"></span>
                                </td>
                                <td class="px-4 py-3 text-right">
                                    <div class="flex items-center justify-end gap-2">
                                        <button @click="editCategory(cat)"
                                            class="rounded-lg p-1.5 text-gray-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors">
                                            <span class="w-4 h-4" x-icon="'pencil'"></span>
                                        </button>
                                        <button @click="deleteCategory(cat.id)"
                                            class="rounded-lg p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                                            <span class="w-4 h-4" x-icon="'trash'"></span>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                        <template x-if="categories.length === 0">
                            <tr>
                                <td colspan="5" class="py-16 text-center text-gray-400">
                                    <span class="w-10 h-10 mx-auto block mb-3" x-icon="'layers'"></span>
                                    <p class="font-bold">No categories yet</p>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>

        <!-- Modal Add/Edit Category -->
        <template x-teleport="body">
            <div x-show="showModal" :class="{ 'show': showModal }" x-trap="showModal" x-transition
                class="fixed inset-0 flex justify-center items-center p-4 overflow-hidden z-[99999] modal" x-cloak>
                <div class="fixed inset-0 h-full w-full bg-gray-900/40 backdrop-blur-xl transition-opacity duration-300"
                    @click="showModal = false"></div>

                <div
                    class="modal-dialog">
                    <!-- close btn -->
                    <button @click="showModal = false"
                        class="modal-close-btn">
                        <span class="w-6 h-6 block" x-icon="'close'"></span>
                    </button>

                    <!-- Modal Content -->
                    <div class="modal-content custom-scrollbar">
                        <div class="modal-header-sticky">
                            <h3 class="h3" x-text="isEditing ? 'Edit Category' : 'Add Category'"></h3>
                            <p class="mt-2 text-sm text-theme-secondary">Organize your products into logical groups.</p>
                        </div>
                        <div class="modal-body-content">
                            <!-- Image -->
                            <div>
                                <label class="form-label">Image</label>
                                <div class="flex items-center gap-3">
                                    <div class="relative h-16 w-16 overflow-hidden rounded-lg bg-gray-100 dark:bg-gray-800 cursor-pointer flex-shrink-0"
                                        @click="$refs.categoryImageInput.click()">
                                        <template x-if="editingItem.imageurl">
                                            <img :src="editingItem.imageurl" class="h-full w-full object-cover">
                                        </template>
                                        <template x-if="!editingItem.imageurl">
                                            <div class="flex h-full items-center justify-center text-gray-300">
                                                <span class="w-6 h-6" x-icon="'upload'"></span>
                                            </div>
                                        </template>
                                        <div x-show="isUploading"
                                            class="absolute inset-0 flex items-center justify-center bg-white/80">
                                            <span
                                                class="h-4 w-4 animate-spin rounded-full border-2 border-brand-500 border-t-transparent"></span>
                                        </div>
                                    </div>
                                    <input type="text" x-model="editingItem.imageurl"
                                        class="form-input flex-1"
                                        placeholder="Image URL">
                                </div>
                            </div>
                            <div>
                                <label class="form-label">Name
                                    *</label>
                                <input type="text" x-model="editingItem.name"
                                    class="form-input"
                                    placeholder="Category name">
                            </div>
                            <div>
                                <label class="form-label">Slug</label>
                                <input type="text" x-model="editingItem.slug"
                                    class="form-input font-mono"
                                    placeholder="category-slug">
                            </div>
                            <div>
                                <label class="form-label">Description</label>
                                <textarea x-model="editingItem.description" rows="2"
                                    class="form-input"
                                    placeholder="Short description"></textarea>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="form-label">Sort
                                        Order</label>
                                    <input type="number" x-model.number="editingItem.sortorder"
                                        class="form-input">
                                </div>
                                <div class="flex items-end pb-1">
                                    <label class="flex cursor-pointer items-center gap-2">
                                        <input type="checkbox" x-model="editingItem.active" class="peer sr-only">
                                        <div
                                            class="relative h-6 w-11 rounded-full bg-gray-200 after:absolute after:left-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all peer-checked:bg-brand-600 peer-checked:after:translate-x-full dark:bg-gray-700">
                                        </div>
                                        <span class="text-sm font-bold text-gray-700 dark:text-gray-300">Active</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Modal Footer -->
                        <footer class="modal-footer-actions">
                            <button @click="showModal = false"
                                class="btn btn-outline flex-1">Cancel</button>
                            <button id="save-category-btn" @click="saveCategory()"
                                class="btn btn-primary flex-1">Save
                                Category</button>
                        </footer>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- ============================================================ -->
    <!-- TAB: LANDING PAGE CONFIG -->
    <!-- ============================================================ -->

</div>

<style>
    @keyframes marquee-scroll {
        0% {
            transform: translateX(0);
        }

        100% {
            transform: translateX(-33.33%);
        }
    }
</style>
