<div id="album-admin-page-container" class="w-full animate-fade-in" x-data="albumManager" x-init="init()">
    <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Album Manager</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Kelola album virtual dan metadata file gambar untuk /p/album.html. Album auto-generated dari upload gambar akan ditampilkan sebagai read-only.</p>
        </div>
        <div class="flex flex-wrap gap-2">
            <button @click="openAddAlbum()" class="btn btn-primary inline-flex items-center gap-2">
                <span class="w-4 h-4" x-icon="'plus'"></span> Tambah Album
            </button>
            <button @click="syncMetadata()" :disabled="isSyncing" class="btn btn-outline inline-flex items-center gap-2">
                <span class="w-4 h-4" :class="isSyncing ? 'animate-spin' : ''" x-icon="'refresh'"></span>
                <span x-text="isSyncing ? 'Menyinkronkan...' : 'Sync Metadata'"></span>
            </button>
        </div>
    </div>

    <div class="grid gap-6 lg:grid-cols-[320px_1fr]">
        <section class="space-y-4 rounded-3xl border border-gray-100 bg-white p-5 shadow-sm dark:border-gray-800 dark:bg-gray-900">
            <div class="flex items-center justify-between gap-2">
                <div>
                    <h2 class="text-lg font-bold text-gray-900 dark:text-white">Daftar Album</h2>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Pilih album untuk melihat file yang terkait.</p>
                </div>
                <span class="rounded-full bg-blue-50 px-3 py-1 text-xs font-bold text-blue-600 dark:bg-blue-900/20 dark:text-blue-300" x-text="albums.length + ' album'"></span>
            </div>

            <template x-if="isLoading">
                <div class="rounded-3xl border border-dashed border-gray-200 p-6 text-center text-gray-500 dark:border-gray-700 dark:text-gray-400">Loading...</div>
            </template>

            <template x-if="!isLoading && albums.length === 0">
                <div class="rounded-3xl border border-dashed border-gray-200 p-8 text-center text-gray-500 dark:border-gray-700 dark:text-gray-400">
                    <p>Belum ada album.</p>
                    <button @click="openAddAlbum()" class="btn btn-primary mt-4">Buat Album Baru</button>
                </div>
            </template>

            <template x-if="!isLoading && albums.length > 0">
                <div class="space-y-3">
                    <template x-for="album in albums" :key="album.id">
                        <div :class="selectedAlbumId === album.id ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/20' : 'border-gray-200 bg-white dark:border-gray-800 dark:bg-gray-950'"
                            class="flex items-start justify-between gap-3 rounded-3xl border p-4 transition-colors">
                            <button @click="selectAlbum(album.id)" type="button" class="flex-1 text-left">
                                <div class="flex items-center gap-2">
                                    <h3 class="font-semibold text-gray-900 dark:text-white" x-text="album.name"></h3>
                                    <template x-if="album.id.startsWith('AUTO-')">
                                        <span class="rounded-full bg-gray-100 px-2 py-0.5 text-xs font-bold text-gray-600 dark:bg-gray-800 dark:text-gray-400">Auto</span>
                                    </template>
                                </div>
                                <p class="text-xs text-gray-500 dark:text-gray-400" x-text="album.slug"></p>
                                <template x-if="album.id.startsWith('AUTO-')">
                                    <p class="text-xs text-gray-400 dark:text-gray-500 mt-1" x-text="album.description"></p>
                                </template>
                            </button>
                            <div class="flex flex-shrink-0 gap-2">
                                <template x-if="!album.id.startsWith('AUTO-')">
                                    <button @click="editAlbum(album)" type="button"
                                        class="inline-flex items-center gap-1 rounded-full border border-blue-300 bg-blue-50 px-3 py-2 text-sm font-semibold text-blue-700 hover:bg-blue-100 dark:border-blue-800 dark:bg-blue-900/30 dark:text-blue-300 dark:hover:bg-blue-900/50 transition-colors">
                                        <span class="w-4 h-4" x-icon="'pencil'"></span>
                                        <span class="hidden sm:inline">Edit</span>
                                    </button>
                                    <button @click="deleteAlbum(album.id)" type="button"
                                        class="inline-flex items-center gap-1 rounded-full border border-red-300 bg-red-50 px-3 py-2 text-sm font-semibold text-red-700 hover:bg-red-100 dark:border-red-800 dark:bg-red-900/30 dark:text-red-300 dark:hover:bg-red-900/50 transition-colors">
                                        <span class="w-4 h-4" x-icon="'trash'"></span>
                                        <span class="hidden sm:inline">Hapus</span>
                                    </button>
                                </template>
                                <template x-if="album.id.startsWith('AUTO-')">
                                    <span class="inline-flex items-center gap-1 rounded-full border border-gray-300 bg-gray-50 px-3 py-2 text-sm font-semibold text-gray-500 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-400">
                                        <span class="w-4 h-4" x-icon="'eye'"></span>
                                        <span class="hidden sm:inline">View Only</span>
                                    </span>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </section>

        <section class="rounded-3xl border border-gray-100 bg-white p-5 shadow-sm dark:border-gray-800 dark:bg-gray-900">
            <div class="mb-4 flex items-center justify-between gap-4">
                <div>
                    <h2 class="text-lg font-bold text-gray-900 dark:text-white">Album: <span x-text="selectedAlbumName"></span></h2>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Upload dan kelola file gambar album.</p>
                </div>
                <label class="cursor-pointer rounded-3xl border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-800 dark:bg-gray-950 dark:text-gray-200">
                    <input type="file" accept="image/*" class="hidden" @change="uploadAlbumImage($event)">
                    <span x-text="isUploading ? 'Uploading...' : 'Upload Gambar'"></span>
                </label>
            </div>

            <template x-if="selectedAlbumId && albumFiles.length === 0">
                <div class="rounded-3xl border border-dashed border-gray-200 p-8 text-center text-gray-500 dark:border-gray-700 dark:text-gray-400">Belum ada gambar di album ini. Upload untuk menambahkan.</div>
            </template>

            <template x-if="selectedAlbumId && albumFiles.length > 0">
                <div class="space-y-4">
                    <template x-for="file in albumFiles" :key="file.id">
                        <div class="grid gap-3 rounded-3xl border border-gray-200 p-4 sm:grid-cols-[auto_1fr_auto] dark:border-gray-800">
                            <div class="h-20 w-20 overflow-hidden rounded-3xl bg-gray-100 dark:bg-gray-950">
                                <img :src="file.fileurl" alt="" class="h-full w-full object-cover">
                            </div>
                            <div class="space-y-2">
                                <div class="flex items-center justify-between gap-2">
                                    <div>
                                        <h3 class="font-semibold text-gray-900 dark:text-white" x-text="file.originalfilename || file.filename"></h3>
                                        <p class="text-xs text-gray-500 dark:text-gray-400" x-text="file.mimeType + ' • ' + (file.size || '-') + ' bytes'"></p>
                                    </div>
                                </div>
                                <p class="text-xs text-gray-500 dark:text-gray-400">Uploaded: <span x-text="formatDate(file.uploadedat)"></span></p>
                            </div>
                            <button @click="deleteFile(file.id)" class="btn btn-danger h-11 w-full sm:w-auto">Delete</button>
                        </div>
                    </template>
                </div>
            </template>

            <template x-if="!selectedAlbumId">
                <div class="rounded-3xl border border-dashed border-gray-200 p-8 text-center text-gray-500 dark:border-gray-700 dark:text-gray-400">Pilih album terlebih dahulu untuk melihat konten filenya.</div>
            </template>
        </section>
    </div>

    <template x-teleport="body">
        <div x-show="showAlbumModal" x-trap="showAlbumModal" x-transition class="fixed inset-0 flex items-center justify-center p-4 z-[99999]" x-cloak>
            <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm" @click="showAlbumModal = false"></div>
            <div class="modal-dialog max-w-2xl">
                <div class="modal-content">
                    <div class="modal-header-sticky">
                        <h3 class="h3" x-text="isEditing ? 'Edit Album' : 'Buat Album Baru'"></h3>
                        <button @click="showAlbumModal = false" class="modal-close-btn"><span class="w-6 h-6" x-icon="'close'"></span></button>
                    </div>
                    <div class="space-y-4 p-6">
                        <div>
                            <label class="label">Nama Album</label>
                            <input type="text" x-model="editingAlbum.name" placeholder="Contoh: Summer Product" class="input" />
                        </div>
                        <div>
                            <label class="label">Slug Album</label>
                            <input type="text" x-model="editingAlbum.slug" placeholder="Contoh: summer-product" class="input" />
                        </div>
                        <div>
                            <label class="label">Deskripsi</label>
                            <textarea x-model="editingAlbum.description" rows="4" class="input"></textarea>
                        </div>
                        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                            <label class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-300">
                                <input type="checkbox" x-model="editingAlbum.active" class="h-4 w-4 rounded border-gray-300 text-brand-500" />
                                Aktifkan Album
                            </label>
                            <button @click="saveAlbum()" class="btn btn-primary">Simpan Album</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>
