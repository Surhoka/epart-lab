<div id="album-admin-page-container" class="w-full animate-fade-in" x-data="albumManager" x-init="init()">
    <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Album Manager</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Kelola album virtual dan metadata file gambar untuk
                /p/album.html.</p>
        </div>
        <div class="flex flex-wrap gap-2">
            <button @click="openAddAlbum()" class="btn btn-primary inline-flex items-center gap-2">
                <span class="w-4 h-4" x-icon="'plus'"></span> Tambah Album
            </button>
            <button @click="syncMetadata()" :disabled="isSyncing"
                class="btn btn-outline inline-flex items-center gap-2">
                <span class="w-4 h-4" :class="isSyncing ? 'animate-spin' : ''" x-icon="'refresh'"></span>
                <span x-text="isSyncing ? 'Menyinkronkan...' : 'Sync Metadata'"></span>
            </button>
        </div>
    </div>

    <div class="grid gap-6 lg:grid-cols-[320px_1fr]">
        <section
            class="space-y-4 rounded-3xl border border-gray-100 bg-white p-5 shadow-sm dark:border-gray-800 dark:bg-gray-900">
            <div class="flex items-center justify-between gap-2">
                <div>
                    <h2 class="text-lg font-bold text-gray-900 dark:text-white">Daftar Album</h2>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Pilih album untuk melihat file yang terkait.</p>
                </div>
                <span
                    class="rounded-full bg-blue-50 px-3 py-1 text-xs font-bold text-blue-600 dark:bg-blue-900/20 dark:text-blue-300"
                    x-text="albums.length + ' album'"></span>
            </div>

            <template x-if="isLoading">
                <div
                    class="rounded-3xl border border-dashed border-gray-200 p-6 text-center text-gray-500 dark:border-gray-700 dark:text-gray-400">
                    Loading...</div>
            </template>

            <template x-if="!isLoading && albums.length === 0">
                <div
                    class="rounded-3xl border border-dashed border-gray-200 p-8 text-center text-gray-500 dark:border-gray-700 dark:text-gray-400">
                    <p>Belum ada album.</p>
                    <button @click="openAddAlbum()" class="btn btn-primary mt-4">Buat Album Baru</button>
                </div>
            </template>

            <template x-if="!isLoading && albums.length > 0">
                <div class="space-y-3">
                    <template x-for="album in albums" :key="album.id">
                        <div :class="selectedAlbumId === album.id ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/20' : 'border-gray-200 bg-white dark:border-gray-800 dark:bg-gray-950'"
                            class="flex items-start justify-between gap-3 rounded-3xl border p-4 transition-colors">
                            <button @click="selectAlbum(album.id)" type="button" class="flex-1 text-left">
                                <h3 class="font-semibold text-gray-900 dark:text-white" x-text="album.name"></h3>
                                <p class="text-xs text-gray-500 dark:text-gray-400" x-text="album.slug"></p>
                            </button>
                            <div class="flex flex-shrink-0 gap-2">
                                <button @click="editAlbum(album)" type="button"
                                    class="inline-flex items-center gap-1 rounded-full border border-blue-300 bg-blue-50 px-3 py-2 text-sm font-semibold text-blue-700 hover:bg-blue-100 dark:border-blue-800 dark:bg-blue-900/30 dark:text-blue-300 dark:hover:bg-blue-900/50 transition-colors">
                                    <span class="w-4 h-4" x-icon="'pencil'"></span>
                                    <span class="hidden sm:inline">Edit</span>
                                </button>
                                <button @click="deleteAlbum(album.id)" type="button"
                                    class="inline-flex items-center gap-1 rounded-full border border-red-300 bg-red-50 px-3 py-2 text-sm font-semibold text-red-700 hover:bg-red-100 dark:border-red-800 dark:bg-red-900/30 dark:text-red-300 dark:hover:bg-red-900/50 transition-colors">
                                    <span class="w-4 h-4" x-icon="'trash'"></span>
                                    <span class="hidden sm:inline">Hapus</span>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

        </section>

        <section
            class="rounded-3xl border border-gray-100 bg-white p-5 shadow-sm dark:border-gray-800 dark:bg-gray-900">
            <div class="mb-4 flex items-center justify-between gap-4">
                <div>
                    <h2 class="text-lg font-bold text-gray-900 dark:text-white">Album: <span
                            x-text="selectedAlbumName"></span></h2>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Upload dan kelola file gambar album.</p>
                </div>
                <div class="flex gap-2">
                    <button type="button" @click.prevent.stop="openBloggerEditor()"
                        class="btn btn-primary h-10 inline-flex items-center gap-2">
                        <span class="w-4 h-4" x-icon="'plus'"></span>
                        Upload & Salin Template
                    </button>
                </div>
            </div>

            <template x-if="selectedAlbumId && albumFiles.length === 0">
                <div
                    class="rounded-3xl border border-dashed border-gray-200 p-8 text-center text-gray-500 dark:border-gray-700 dark:text-gray-400">
                    Belum ada gambar di album ini. Upload untuk menambahkan.</div>
            </template>

            <template x-if="selectedAlbumId && albumFiles.length > 0">
                <div class="overflow-x-auto rounded-3xl border border-gray-100 bg-white dark:border-gray-800 dark:bg-gray-950">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-gray-100 bg-gray-50/50 dark:border-gray-800 dark:bg-gray-900/50">
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-gray-500">Preview</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-gray-500">Nama File</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-gray-500">URL Gambar</th>
                                <th class="px-6 py-4 text-right text-xs font-bold uppercase tracking-wider text-gray-500">Aksi</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
                            <template x-for="file in albumFiles" :key="file.id">
                                <tr class="hover:bg-gray-50 dark:hover:bg-gray-900/40 transition-colors">
                                    <td class="px-6 py-4">
                                        <div class="h-12 w-12 overflow-hidden rounded-xl bg-gray-100 dark:bg-gray-800">
                                            <img :src="file.fileurl" alt="" class="h-full w-full object-cover clickable" @click="window.open(file.fileurl, '_blank')">
                                        </div>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="font-medium text-gray-900 dark:text-white" x-text="file.originalfilename || file.filename"></div>
                                        <div class="text-xs text-gray-500" x-text="file.mimeType + ' • ' + (file.size || '-') + ' bytes'"></div>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-2">
                                            <code class="max-w-[150px] truncate rounded bg-gray-100 px-2 py-1 text-xs text-gray-600 dark:bg-gray-800 dark:text-gray-400" x-text="file.fileurl"></code>
                                            <button @click="navigator.clipboard.writeText(file.fileurl); showToast('URL disalin!')" class="text-gray-400 hover:text-brand-500">
                                                <span class="w-4 h-4" x-icon="'copy'"></span>
                                            </button>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-right">
                                        <button @click="deleteFile(file.id)" class="text-red-500 hover:text-red-700 transition-colors">
                                            <span class="w-5 h-5" x-icon="'trash'"></span>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <template x-if="!selectedAlbumId">
                <div
                    class="rounded-3xl border border-dashed border-gray-200 p-8 text-center text-gray-500 dark:border-gray-700 dark:text-gray-400">
                    Pilih album terlebih dahulu untuk melihat konten filenya.</div>
            </template>
        </section>
    </div>

    <template x-teleport="body">
        <div x-show="showAlbumModal" x-trap="showAlbumModal" x-transition
            class="fixed inset-0 flex items-center justify-center p-4 z-[99999]" x-cloak>
            <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm" @click="showAlbumModal = false"></div>
            <div class="modal-dialog max-w-2xl">
                <div class="modal-content">
                    <div class="modal-header-sticky">
                        <h3 class="h3" x-text="isEditing ? 'Edit Album' : 'Buat Album Baru'"></h3>
                        <button @click="showAlbumModal = false" class="modal-close-btn"><span class="w-6 h-6"
                                x-icon="'close'"></span></button>
                    </div>
                    <div class="space-y-4 p-6">
                        <div>
                            <label class="label">Nama Album</label>
                            <input type="text" x-model="editingAlbum.name" placeholder="Contoh: Summer Product"
                                class="input" />
                        </div>
                        <div>
                            <label class="label">Slug Album</label>
                            <input type="text" x-model="editingAlbum.slug" placeholder="Contoh: summer-product"
                                class="input" />
                        </div>
                        <div>
                            <label class="label">Deskripsi</label>
                            <textarea x-model="editingAlbum.description" rows="4" class="input"></textarea>
                        </div>
                        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                            <label class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-300">
                                <input type="checkbox" x-model="editingAlbum.active"
                                    class="h-4 w-4 rounded border-gray-300 text-brand-500" />
                                Aktifkan Album
                            </label>
                            <button @click="saveAlbum()" class="btn btn-primary">Simpan Album</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>
