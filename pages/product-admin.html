<div id="product-admin-page-container" class="w-full animate-fade-in" x-data="featuredProductManager" x-init="init()">
    <!-- Header -->
    <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Product Manager</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Manage featured products displayed on the storefront.</p>
        </div>
        <div class="flex gap-2">
            <button @click="fetchProducts()" class="flex items-center gap-2 rounded-xl border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 transition-colors">
                <span class="w-4 h-4" :class="isLoading ? 'animate-spin' : ''" x-icon="'refresh'"></span> Refresh
            </button>
            <button @click="openAddModal()" class="flex items-center gap-2 rounded-xl bg-brand-500 px-4 py-2 text-sm font-bold text-white shadow-sm hover:bg-brand-600 transition-all active:scale-95">
                <span class="w-4 h-4" x-icon="'plus'"></span> Add Product
            </button>
        </div>
    </div>

    <!-- Stats/Info Row -->
    <div class="mb-6 flex items-center justify-between">
        <p class="text-sm text-gray-500 dark:text-gray-400">
            <span class="font-bold text-brand-600 dark:text-brand-400" x-text="products.length"></span> products registered
        </p>
    </div>

    <input type="file" x-ref="productImageInput" class="hidden" accept="image/*" @change="handleImageUpload($event)">

    <!-- Loading -->
    <template x-if="isLoading">
        <div class="flex items-center justify-center py-16">
            <span class="h-8 w-8 animate-spin rounded-full border-4 border-brand-500 border-t-transparent"></span>
        </div>
    </template>

    <!-- Products Grid -->
    <template x-if="!isLoading">
        <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
            <template x-for="product in products" :key="product.id">
                <div class="group relative overflow-hidden rounded-2xl border border-gray-100 bg-white shadow-sm dark:border-gray-800 dark:bg-gray-900">
                    <!-- Image -->
                    <div class="relative aspect-square bg-gray-100 dark:bg-gray-800 overflow-hidden">
                        <template x-if="product.imageurl">
                            <img :src="product.imageurl" class="h-full w-full object-cover" :alt="product.name">
                        </template>
                        <template x-if="!product.imageurl">
                            <div class="flex h-full items-center justify-center text-gray-300">
                                <span class="w-10 h-10" x-icon="'shopping-bag'"></span>
                            </div>
                        </template>
                        <!-- Badge -->
                        <template x-if="product.badge">
                            <span class="absolute top-2 left-2 rounded-full bg-brand-500 px-2 py-0.5 text-[10px] font-black text-white" x-text="product.badge"></span>
                        </template>
                        <!-- Status -->
                        <span class="absolute top-2 right-2 rounded-full px-2 py-0.5 text-[10px] font-bold"
                            :class="(product.active === true || product.active === 'TRUE') ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                            x-text="(product.active === true || product.active === 'TRUE') ? 'Active' : 'Inactive'"></span>
                    </div>
                    <!-- Info -->
                    <div class="p-4">
                        <h3 class="font-bold text-gray-900 dark:text-white truncate" x-text="product.name"></h3>
                        <p class="mt-0.5 text-xs text-gray-400 truncate" x-text="product.category || '—'"></p>
                        <div class="mt-2 flex items-baseline gap-2">
                            <span class="text-sm font-black text-brand-600" x-text="formatPrice(product.price)"></span>
                            <template x-if="product.originalprice && Number(product.originalprice) > Number(product.price)">
                                <span class="text-xs text-gray-400 line-through" x-text="formatPrice(product.originalprice)"></span>
                            </template>
                        </div>
                        <div class="mt-3 flex items-center gap-2">
                            <button @click="editProduct(product)" class="flex-1 rounded-xl border border-gray-200 py-1.5 text-xs font-bold text-gray-600 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-300 transition-colors">Edit</button>
                            <button @click="deleteProduct(product.id)" class="rounded-xl border border-red-100 py-1.5 px-3 text-xs font-bold text-red-500 hover:bg-red-50 dark:border-red-900/30 transition-colors">
                                <span class="w-3.5 h-3.5" x-icon="'trash'"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Empty State -->
            <template x-if="products.length === 0">
                <div class="col-span-full flex flex-col items-center justify-center rounded-2xl border-2 border-dashed border-gray-200 py-16 dark:border-gray-800">
                    <span class="w-12 h-12 text-gray-300" x-icon="'shopping-bag'"></span>
                    <p class="mt-4 font-bold text-gray-500">No featured products yet</p>
                    <button @click="openAddModal()" class="mt-4 rounded-xl bg-brand-500 px-5 py-2 text-sm font-bold text-white hover:bg-brand-600">Add First Product</button>
                </div>
            </template>
        </div>
    </template>

    <!-- Modal Add/Edit Product -->
    <template x-teleport="body">
        <div x-show="showModal" :class="{ 'show': showModal }" x-trap="showModal" x-transition
            class="fixed inset-0 flex justify-center items-center p-4 overflow-hidden z-[99999] modal" x-cloak>
            <div class="fixed inset-0 h-full w-full bg-gray-900/40 backdrop-blur-xl transition-opacity duration-300"
                @click="showModal = false"></div>

            <div class="modal-dialog relative w-full max-w-lg max-h-[90vh] flex flex-col rounded-[32px] bg-white dark:bg-gray-900 p-8 shadow-2xl transition-all duration-300">
                <!-- Modal Header -->
                <header class="flex items-start justify-between mb-6 shrink-0">
                    <div>
                        <h3 class="text-xl font-black text-gray-900 dark:text-white" x-text="isEditing ? 'Edit Product' : 'Add Product'"></h3>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Configure products to be displayed in the featured section.</p>
                    </div>
                    <button @click="showModal = false"
                        class="absolute right-6 top-6 flex h-10 w-10 items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-500 transition-all hover:scale-110">
                        <span class="w-6 h-6 block" x-icon="'close'"></span>
                    </button>
                </header>

                <!-- Modal Content -->
                <div class="flex flex-col modal-content custom-scrollbar overflow-y-auto pr-2 min-h-0">
                    <div class="space-y-4">
                        <!-- Image -->
                        <div>
                            <label class="mb-1.5 block text-xs font-black uppercase tracking-widest text-gray-500">Product Image</label>
                            <div class="relative group aspect-square w-32 overflow-hidden rounded-2xl bg-gray-100 dark:bg-gray-800 cursor-pointer" @click="$refs.productImageInput.click()">
                                <template x-if="editingItem.imageurl">
                                    <img :src="editingItem.imageurl" class="h-full w-full object-cover">
                                </template>
                                <template x-if="!editingItem.imageurl">
                                    <div class="flex h-full flex-col items-center justify-center text-gray-300 gap-1">
                                        <span class="w-6 h-6" x-icon="'upload'"></span>
                                        <span class="text-[10px] font-bold">Upload</span>
                                    </div>
                                </template>
                                <div x-show="isUploading" class="absolute inset-0 flex items-center justify-center bg-white/80">
                                    <span class="h-5 w-5 animate-spin rounded-full border-2 border-brand-500 border-t-transparent"></span>
                                </div>
                            </div>
                            <input type="text" x-model="editingItem.imageurl" class="mt-2 w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-xs dark:border-gray-700 dark:bg-gray-800 dark:text-white" placeholder="Or enter image URL">
                        </div>
                        <div>
                            <label class="mb-1.5 block text-xs font-black uppercase tracking-widest text-gray-500">Product Name *</label>
                            <input type="text" x-model="editingItem.name" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white" placeholder="Product name">
                        </div>
                        <div>
                            <label class="mb-1.5 block text-xs font-black uppercase tracking-widest text-gray-500">Description</label>
                            <textarea x-model="editingItem.description" rows="2" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white resize-none" placeholder="Short product description"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="mb-1.5 block text-xs font-black uppercase tracking-widest text-gray-500">Sale Price (IDR)</label>
                                <input type="number" x-model.number="editingItem.price" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white">
                            </div>
                            <div>
                                <label class="mb-1.5 block text-xs font-black uppercase tracking-widest text-gray-500">Strike Price (IDR)</label>
                                <input type="number" x-model.number="editingItem.originalprice" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="mb-1.5 block text-xs font-black uppercase tracking-widest text-gray-500">Category</label>
                                <input type="text" x-model="editingItem.category" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white" placeholder="Category">
                            </div>
                            <div>
                                <label class="mb-1.5 block text-xs font-black uppercase tracking-widest text-gray-500">Badge</label>
                                <input type="text" x-model="editingItem.badge" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white" placeholder="HOT, NEW, SALE">
                            </div>
                        </div>
                        <div>
                            <label class="mb-1.5 block text-xs font-black uppercase tracking-widest text-gray-500">Product Link</label>
                            <input type="text" x-model="editingItem.link" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white" placeholder="#shop or URL">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="mb-1.5 block text-xs font-black uppercase tracking-widest text-gray-500">Sort Order</label>
                                <input type="number" x-model.number="editingItem.sortorder" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white">
                            </div>
                            <div class="flex items-end pb-1">
                                <label class="flex cursor-pointer items-center gap-2">
                                    <input type="checkbox" x-model="editingItem.active" class="peer sr-only">
                                    <div class="relative h-6 w-11 rounded-full bg-gray-200 after:absolute after:left-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all peer-checked:bg-brand-600 peer-checked:after:translate-x-full dark:bg-gray-700"></div>
                                    <span class="text-sm font-bold text-gray-700 dark:text-gray-300">Active</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Modal Footer -->
                    <footer class="mt-8 flex gap-3 pb-2 pt-4 border-t border-gray-50 dark:border-gray-800">
                        <button @click="showModal = false" class="flex-1 rounded-xl border border-gray-200 py-3 text-sm font-bold text-gray-600 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-300 transition-colors">Cancel</button>
                        <button id="save-product-btn" @click="saveProduct()" class="flex-1 rounded-xl bg-brand-500 py-3 text-sm font-bold text-white hover:bg-brand-600 shadow-xl shadow-brand-500/10 transition-all active:scale-95">Save Product</button>
                    </footer>
                </div>
            </div>
        </div>
    </template>
</div>
