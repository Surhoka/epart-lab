<div x-data="initPostListPage()" x-init="init()" class="max-w-7xl mx-auto px-4 lg:px-6 py-8 animate-fade-in space-y-12">

    <!-- Header & Search -->
    <div
        class="flex flex-col md:flex-row justify-between items-end gap-6 bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-theme-xs border border-gray-100 dark:border-gray-700">
        <div class="space-y-2">
            <h1 class="text-4xl font-black text-gray-900 dark:text-white tracking-tight">Update Otomotif</h1>
            <p class="text-gray-500 font-medium">Tips perawatan, wawasan industri, dan berita terbaru seputar otomotif.
            </p>
        </div>
        <div class="flex gap-4 w-full md:w-auto">
            <div class="relative w-full md:w-82 group">
                <span
                    class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-brand-500 transition-colors">
                    <span class="w-5 h-5" x-icon="'search'"></span>
                </span>
                <input type="text" x-model="searchQuery" placeholder="Cari artikel atau tips..."
                    class="pl-12 pr-4 py-3.5 rounded-2xl border border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 w-full focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all placeholder:text-gray-400">
            </div>
        </div>
    </div>

    <!-- LOADING & ERROR STATES -->
    <template x-if="isLoading">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="i in 6">
                <div class="aspect-video rounded-[2.5rem] bg-gray-100 dark:bg-gray-800 animate-pulse"></div>
            </template>
        </div>
    </template>

    <template x-if="!isLoading && error">
        <div
            class="text-center py-20 bg-white dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700 shadow-sm">
            <p class="text-gray-500 font-medium">Gagal memuat berita. Silakan coba sesaat lagi.</p>
            <button @click="init()" class="mt-4 text-brand-600 font-bold hover:underline">Sinyal Ulang</button>
        </div>
    </template>

    <!-- POST GRID -->
    <div x-show="!isLoading && !error" x-cloak>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10">
            <template x-for="(item, index) in filteredItems" :key="item.id || item.slug || index">
                <article @click="viewDetail(item)"
                    class="group bg-white dark:bg-gray-800 rounded-xl shadow-sm hover:shadow-xl transition-all border border-gray-100 dark:border-gray-700 overflow-hidden flex flex-col h-full cursor-pointer">
                    <!-- Image -->
                    <div class="relative h-48 bg-gray-50 dark:bg-gray-900/50 overflow-hidden block flex-shrink-0">
                        <img :src="item.image || item.imageurl || item.imageUrl || 'https://dummyimage.com/400x250/cccccc/000000&text=No+Image'"
                            :alt="item.title"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute top-3 left-3">
                            <span
                                class="bg-brand-500 text-white text-[10px] font-bold px-2 py-1 rounded-lg shadow-sm"
                                x-text="item.category || 'NEWS'"></span>
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="flex-grow flex flex-col px-4 pb-4 pt-4">
                        <div class="text-xs text-gray-400 mb-2" x-text="item.publishdate ? new Date(item.publishdate).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' }) : 'Baru'"></div>
                        <h3
                            class="font-bold text-gray-900 dark:text-white line-clamp-2 leading-tight group-hover:text-brand-600 transition-colors mb-2"
                            x-text="item.title">
                        </h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-3 mb-4"
                            x-text="getSnippet(item.description || item.snippet)"></p>
                        <div class="mt-auto pt-2 border-t border-gray-50 dark:border-gray-700/50">
                            <div class="text-brand-600 hover:text-brand-700 font-bold text-sm inline-flex items-center gap-1">
                                Read More
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M17 8l4 4m0 0l-4 4m4-4H3" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </article>
            </template>
        </div>

        <!-- Empty State -->
        <template x-if="filteredItems.length === 0">
            <div class="text-center py-32 space-y-4">
                <div
                    class="w-20 h-20 bg-gray-50 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto text-gray-300">
                    <span class="w-10 h-10" x-icon="'book-open'"></span>
                </div>
                <p class="text-gray-500 font-medium">Tidak ada artikel yang sesuai dengan kata pencarian Anda.</p>
                <button @click="searchQuery = ''" class="text-brand-600 font-bold hover:underline">Reset Filter</button>
            </div>
        </template>
    </div>

</div>

<script>
    function initPostListPage() {
        return {
            isLoading: true,
            error: false,
            collection: [],
            searchQuery: '',

            async init() {
                this.isLoading = true;
                try {
                    // 1. Fetch from Blogger Article Feed
                    const res = await fetch('/feeds/posts/default/-/Article?alt=json&max-results=150');
                    if (!res.ok) throw new Error('Feed error');
                    const data = await res.json();

                    let items = [];
                    if (data.feed && data.feed.entry) {
                        data.feed.entry.forEach(entry => {
                            const html = entry.content ? entry.content.$t : '';
                            const metaMatch = html.match(/data-meta=["'](.*?)["']/);
                            if (metaMatch && metaMatch[1]) {
                                try {
                                    // Unescape JSON string agar aman saat diparsing
                                    const cleanJson = metaMatch[1]
                                        .replace(/&apos;/g, "'")
                                        .replace(/&quot;/g, '"')
                                        .replace(/&amp;/g, "&");
                                    const meta = JSON.parse(cleanJson);

                                    // Pemulihan ID/Slug jika metadata tidak lengkap
                                    if (!meta.id) meta.id = entry.id.$t.split('post-').pop();
                                    if (!meta.slug) {
                                        const altLink = entry.link.find(l => l.rel === 'alternate');
                                        if (altLink) meta.slug = altLink.href.split('/').pop().replace('.html', '');
                                    }

                                    // Map link
                                    const altLink = entry.link.find(l => l.rel === 'alternate');
                                    if (altLink) meta.path = new URL(altLink.href).pathname;

                                    items.push(meta);
                                } catch (e) { }
                            }
                        });
                    }

                    // 2. Fallback to AdminAPI if needed
                    if (items.length === 0) {
                        const apiRes = await window.AdminAPI.getPosts();
                        if (apiRes.status === 'success') items = apiRes.data || [];
                    }

                    // Deduplikasi data berdasarkan ID untuk mencegah Alpine Key collision
                    const uniqueItems = [];
                    const seen = new Set();
                    items.forEach(item => {
                        const key = item.id || item.slug || Math.random().toString(36);
                        if (!seen.has(key)) {
                            seen.add(key);
                            uniqueItems.push(item);
                        }
                    });

                    this.collection = uniqueItems;
                    this.updateBreadcrumb();
                } catch (e) {
                    console.error('PostList load failure:', e);
                    this.error = true;
                } finally {
                    this.isLoading = false;
                }
            },

            get filteredItems() {
                if (!Array.isArray(this.collection)) return [];
                if (!this.searchQuery) return this.collection;
                const q = this.searchQuery.toLowerCase();
                return this.collection.filter(i => (i && i.title || '').toLowerCase().includes(q));
            },

            viewDetail(item) {
                if (item.path) {
                    window.location.pathname = item.path;
                } else {
                    window.navigate('post', { slug: item.slug || item.id });
                }
            },

            getSnippet(html) {
                if (!html) return '';
                const tmp = document.createElement('div');
                tmp.innerHTML = html.replace(/<[^>]*>?/gm, ' ');
                const text = tmp.textContent || tmp.innerText || '';
                return text.length > 120 ? text.substring(0, 120) + '...' : text;
            },

            updateBreadcrumb() {
                if (window.renderBreadcrumb) {
                    window.renderBreadcrumb([
                        { label: 'Home', link: '/' },
                        { label: 'News' }
                    ]);
                }
            }
        }
    }
</script>
