<div x-data="initPostListPage()" x-init="init()" class="max-w-7xl mx-auto px-4 py-12 animate-fade-in">
    <!-- Breadcrumb Container -->
    <div id="breadcrumb-container" class="mb-8"></div>

    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
        <div>
            <h1 class="text-4xl font-extrabold text-gray-900 dark:text-white mb-2">Semua Berita</h1>
            <p class="text-gray-500 dark:text-gray-400">Informasi terbaru seputar dunia otomotif dan sparepart.</p>
        </div>

        <!-- Search & Filter -->
        <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
            <div class="relative flex-1 sm:w-64">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                    <span class="w-5 h-5" x-icon="'search'"></span>
                </span>
                <input type="text" x-model="searchQuery" placeholder="Cari berita..."
                    class="block w-full pl-10 pr-3 py-2.5 border border-gray-200 dark:border-gray-700 rounded-xl bg-white dark:bg-gray-800 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
            </div>

            <select x-model="selectedCategory"
                class="px-4 py-2.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium focus:ring-2 focus:ring-brand-500 outline-none cursor-pointer">
                <option value="all">Semua Kategori</option>
                <template x-for="cat in categories" :key="cat">
                    <option :value="cat" x-text="cat"></option>
                </template>
            </select>
        </div>
    </div>

    <!-- Loading State -->
    <div x-show="isLoading" class="flex flex-col items-center justify-center py-32 space-y-4">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-500"></div>
        <p class="text-sm font-medium text-gray-500 animate-pulse">Memuat berita...</p>
    </div>

    <!-- Grid -->
    <div x-show="!isLoading" x-cloak>
        <!-- Empty State -->
        <template x-if="filteredPosts.length === 0">
            <div
                class="text-center py-20 bg-gray-50 dark:bg-gray-800/50 rounded-[2rem] border-2 border-dashed border-gray-200 dark:border-gray-700">
                <div
                    class="w-16 h-16 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="w-8 h-8 text-gray-400" x-icon="'search'"></span>
                </div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">Tidak ada berita ditemukan</h3>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Coba gunakan kata kunci lain atau ubah kategori.</p>
                <button @click="searchQuery = ''; selectedCategory = 'all'"
                    class="mt-6 text-brand-600 font-bold hover:underline">Reset Pencarian</button>
            </div>
        </template>

        <!-- Post Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="post in filteredPosts" :key="post.id">
                <article
                    class="group bg-white dark:bg-gray-800 rounded-[2rem] shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-500 border border-gray-100 dark:border-gray-800 overflow-hidden flex flex-col h-full">
                    <!-- Image -->
                    <a :href="'/p/' + (post.slug || post.id) + '.html'" data-type="post"
                        class="relative h-56 bg-gray-50 dark:bg-gray-900/50 overflow-hidden block flex-shrink-0">
                        <img :src="post.image || 'https://dummyimage.com/600x400/f3f4f6/94a3b8&text=No+Image'"
                            :alt="post.title"
                            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-4 left-4">
                            <span
                                class="bg-brand-500 text-white text-[10px] font-bold px-3 py-1.5 rounded-full shadow-lg shadow-brand-500/20 uppercase tracking-widest"
                                x-text="Array.isArray(post.category) ? post.category[0] : (post.category || 'News')"></span>
                        </div>
                    </a>

                    <!-- Content -->
                    <div class="flex-grow flex flex-col p-6 lg:p-8">
                        <div class="flex items-center gap-2 text-xs text-gray-400 mb-4">
                            <span class="w-4 h-4" x-icon="'clock'"></span>
                            <span x-text="formatDate(post.publishdate || post.datecreated)"></span>
                        </div>

                        <h3
                            class="text-xl font-bold text-gray-900 dark:text-white line-clamp-2 group-hover:text-brand-600 transition-colors mb-4">
                            <a :href="'/p/' + (post.slug || post.id) + '.html'" data-type="post"
                                x-text="post.title"></a>
                        </h3>

                        <p class="text-gray-500 dark:text-gray-400 text-sm line-clamp-3 mb-6 leading-relaxed"
                            x-text="getSnippet(post.content)"></p>

                        <div class="mt-auto pt-6 border-t border-gray-50 dark:border-gray-700/50">
                            <a :href="'/p/' + (post.slug || post.id) + '.html'" data-type="post"
                                class="text-brand-600 dark:text-brand-400 hover:text-brand-700 font-bold text-sm inline-flex items-center gap-2 group/link">
                                Baca Selengkapnya
                                <svg class="w-4 h-4 transform group-hover/link:translate-x-1 transition-transform"
                                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                        d="M17 8l4 4m0 0l-4 4m4-4H3" />
                                </svg>
                            </a>
                        </div>
                    </div>
                </article>
            </template>
        </div>
    </div>
</div>
