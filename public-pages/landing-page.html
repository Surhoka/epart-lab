<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 animate-fade-in" x-data="initLandingPage()">
    <!-- Hero Section -->
    <header class="text-center mb-16">
        <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 dark:text-white tracking-tight">
            Special <span class="text-brand-600">Offers</span> & New Arrivals
        </h1>
        <p class="mt-4 text-xl text-gray-500 dark:text-gray-400 max-w-2xl mx-auto">
            Temukan suku cadang berkualitas tinggi dengan harga terbaik untuk kendaraan Anda.
        </p>
    </header>

    <!-- Controls: Search & Category Filter -->
    <div class="flex flex-col md:flex-row gap-6 items-center justify-between mb-12 bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
        <!-- Categories -->
        <div class="flex items-center gap-2 overflow-x-auto pb-2 md:pb-0 w-full md:w-auto custom-scrollbar">
            <template x-for="cat in categories" :key="cat">
                <button @click="selectedCategory = cat"
                    :class="selectedCategory === cat ? 'bg-brand-600 text-white shadow-lg shadow-brand-600/20' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700'"
                    class="px-5 py-2 rounded-full text-sm font-bold transition-all whitespace-nowrap"
                    x-text="cat">
                </button>
            </template>
        </div>

        <!-- Search -->
        <div class="relative w-full md:w-80">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" x-icon="'search'"></span>
            <input type="text" x-model="searchQuery" placeholder="Cari produk..."
                class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-gray-800 border-none rounded-xl text-sm focus:ring-2 focus:ring-brand-500 dark:text-white transition-all">
        </div>
    </div>

    <!-- Product Grid -->
    <template x-if="loading">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <template x-for="i in 8" :key="i">
                <div class="animate-pulse">
                    <div class="bg-gray-200 dark:bg-gray-800 h-64 rounded-2xl mb-4"></div>
                    <div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-3/4 mb-2"></div>
                    <div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-1/2"></div>
                </div>
            </template>
        </div>
    </template>

    <template x-if="!loading && filteredProducts.length > 0">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <template x-for="product in filteredProducts" :key="product.id">
                <div class="group bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 overflow-hidden transition-all hover:shadow-2xl hover:-translate-y-1">
                    <!-- Image Wrapper -->
                    <div class="relative h-64 overflow-hidden bg-gray-100 dark:bg-gray-800">
                        <template x-if="product.imageUrl">
                            <img :src="product.imageUrl" :alt="product.title" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                        </template>
                        <template x-if="!product.imageUrl">
                            <div class="flex items-center justify-center h-full text-gray-300">
                                <span class="w-12 h-12" x-icon="'image'"></span>
                            </div>
                        </template>

                        <!-- Featured Badge -->
                        <template x-if="product.featured">
                            <div class="absolute top-4 left-4 bg-orange-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg flex items-center gap-1.5">
                                <span class="w-3 h-3" x-icon="'star'"></span>
                                FEATURED
                            </div>
                        </template>

                        <!-- Discount Badge -->
                        <template x-if="product.originalPrice > product.price">
                            <div class="absolute top-4 right-4 bg-red-600 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg"
                                x-text="'-' + getDiscountPercentage(product.price, product.originalPrice) + '%'">
                            </div>
                        </template>
                    </div>

                    <!-- Content -->
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold uppercase tracking-widest text-brand-600" x-text="product.category || 'Spareparts'"></span>
                            <template x-if="product.featured">
                                <span class="w-4 h-4 text-orange-400" x-icon="'star'"></span>
                            </template>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 dark:text-white group-hover:text-brand-600 transition-colors" x-text="product.title"></h3>
                        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400 line-clamp-2" x-text="product.description || 'Kualitas terjamin untuk performa maksimal kendaraan Anda.'"></p>
                        
                        <div class="mt-6 flex items-center justify-between">
                            <div>
                                <div class="text-xl font-black text-gray-900 dark:text-white" x-text="formatPrice(product.price)"></div>
                                <template x-if="product.originalPrice > product.price">
                                    <div class="text-xs text-gray-400 line-through" x-text="formatPrice(product.originalPrice)"></div>
                                </template>
                            </div>
                            <button class="bg-brand-600 hover:bg-brand-700 text-white p-3 rounded-xl shadow-lg transition-all active:scale-90">
                                <span class="w-5 h-5" x-icon="'shopping-cart'"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <!-- Empty State -->
    <template x-if="!loading && filteredProducts.length === 0">
        <div class="text-center py-20 bg-gray-50 dark:bg-gray-800/50 rounded-3xl border-2 border-dashed border-gray-200 dark:border-gray-700">
            <div class="w-20 h-20 bg-white dark:bg-gray-800 rounded-full shadow-xl flex items-center justify-center mx-auto mb-6">
                <span class="w-10 h-10 text-gray-300" x-icon="'search'"></span>
            </div>
            <h3 class="text-2xl font-bold text-gray-900 dark:text-white">Produk tidak ditemukan</h3>
            <p class="mt-2 text-gray-500 dark:text-gray-400 max-w-sm mx-auto">Kami tidak dapat menemukan produk yang sesuai dengan kriteria Anda. Coba kata kunci atau kategori lain.</p>
            <button @click="searchQuery = ''; selectedCategory = 'All'" 
                class="mt-8 text-brand-600 font-bold hover:underline">
                Reset Pencarian
            </button>
        </div>
    </template>
</div>
