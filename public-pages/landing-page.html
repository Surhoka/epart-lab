    <!-- CSS Animations -->
    <style>
        .perspective-1000 {
            perspective: 1000px;
        }

        .rotate-y-6 {
            transform: rotateY(6deg);
        }

        .perspective-1000:hover .group-hover\:rotate-y-6 {
            transform: rotateY(15deg) rotateX(2deg);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-slow {
            animation: spin-slow 20s linear infinite;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slide-up 1s ease-out forwards;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #E5E7EB;
            border-radius: 10px;
        }

        [x-cloak] {
            display: none !important;
        }

        .marquee-track {
            animation: marquee 20s linear infinite;
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }
    </style>

    <script>
    function initLandingPage() {
        return {
            selectedProduct: null,
            loading: true,

            async init() {
                await this.fetchLandingData();
                this.updateBreadcrumb();
            },

            async fetchLandingData() {
                this.loading = true;
                try {
                    // Lapis 1: Memory Hand-off (Instant SPA Navigation)
                    if (window._lastResolvedMeta && window._lastResolvedMeta._type === 'landing-page') {
                        this.selectedProduct = window._lastResolvedMeta;
                        this.loading = false;
                        return;
                    }

                    // Lapis 2: Edge CDN (DOMParser API)
                    try {
                        const feedFetch = await fetch('/feeds/pages/default?alt=json');
                        if (feedFetch.ok) {
                            const data = await feedFetch.json();
                            const entry = data.feed?.entry?.find(e => {
                                const selfLink = e.link.find(l => l.rel === 'alternate');
                                return selfLink && selfLink.href.includes('/p/landing-page.html');
                            });

                            if (entry) {
                                const html = entry.content ? entry.content.$t : '';
                                const doc = new DOMParser().parseFromString(html, 'text/html');
                                const metaNode = doc.querySelector('.ezy-meta');
                                if (metaNode) {
                                    const rawData = metaNode.getAttribute('data-meta') || metaNode.textContent;
                                    const meta = JSON.parse(rawData);
                                    if (meta && meta._type === 'landing-page') {
                                        this.selectedProduct = meta;
                                        window._lastResolvedMeta = meta; // Cache to SPA Router
                                        this.loading = false;
                                        return;
                                    }
                                }
                            }
                        }
                    } catch (feedErr) {
                        console.warn('CDN Feed fetch failed for landing-page:', feedErr);
                    }

                    // Lapis 3: AdminAPI Fallback (Direct Database Query)
                    const res = await window.AdminAPI.get('getPublicLandingData');
                    
                    if (res && res.status === 'success') {
                        const products = res.data || [];
                        this.selectedProduct = products.length > 0 ? products[0] : null;
                    } else {
                        console.error('Failed to fetch sales data:', res?.message);
                    }
                } catch (e) {
                    console.error('Error fetching sales data:', e);
                } finally {
                    this.loading = false;
                }
            },

            formatPrice(price) {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(price);
            },

            getDiscountPercentage(price, originalPrice) {
                if (!originalPrice || originalPrice <= price) return 0;
                return Math.round(((originalPrice - price) / originalPrice) * 100);
            },

            updateBreadcrumb() {
                if (window.renderBreadcrumb) {
                    window.renderBreadcrumb([
                        { label: 'Home', link: '/' },
                        { label: this.selectedProduct ? this.selectedProduct.title : 'Promo' }
                    ]);
                }
            }
        };
    }
    </script>
