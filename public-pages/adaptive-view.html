<div x-data="adaptiveController()" x-init="init()" class="max-w-7xl mx-auto px-4 lg:px-6 py-8 animate-fade-in">

    <!-- 1. BREADCRUMB (Universal) -->
    <div id="breadcrumb-container" class="mb-8"></div>

    <!-- 2. LOADING STATE (Universal) -->
    <div x-show="isLoading" class="flex flex-col items-center justify-center py-32 space-y-4">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-500"></div>
        <p class="text-sm font-medium text-gray-500 animate-pulse">Menyiapkan konten...</p>
    </div>

    <!-- 3. ERROR STATE (Universal) -->
    <div x-show="!isLoading && error"
        class="text-center py-20 bg-white dark:bg-gray-800 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700">
        <div class="w-20 h-20 bg-red-50 dark:bg-red-900/10 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="w-10 h-10 text-red-500" x-icon="'alert-circle'"></span>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Konten Tidak Ditemukan</h2>
        <button @click="window.navigate('home')"
            class="mt-4 bg-brand-500 text-white px-8 py-3 rounded-xl font-bold active:scale-95 transition-all">Kembali
            ke Beranda</button>
    </div>

    <!-- 4. ADAPTIVE CONTENT AREAS -->
    <div x-show="!isLoading && !error" x-cloak>

        <!-- A. LAYOUT: PRODUCT DETAIL -->
        <template x-if="page === 'product'">
            <article class="grid lg:grid-cols-2 gap-10 items-start">
                <div class="relative aspect-square bg-gray-50 dark:bg-gray-800 rounded-3xl overflow-hidden border border-gray-100 dark:border-gray-700">
                    <img :src="content.image" class="w-full h-full object-contain p-4">
                </div>
                <div class="space-y-6">
                    <div class="space-y-2">
                        <span class="text-[10px] font-black uppercase tracking-widest text-brand-600" x-text="content.category"></span>
                        <h1 class="text-4xl font-extrabold text-gray-900 dark:text-white leading-tight" x-text="content.title || content.name"></h1>
                        <div class="flex items-center gap-4 pt-4">
                            <span class="text-3xl font-black text-brand-600" x-text="formatCurrency(content.price)"></span>
                            <span class="text-lg text-gray-400 line-through" x-show="content.originalprice > content.price" x-text="formatCurrency(content.originalprice)"></span>
                        </div>
                    </div>
                    <div class="prose dark:prose-invert max-w-none" x-html="content.description"></div>
                    <div class="pt-6 border-t border-gray-100 dark:border-gray-800">
                        <button @click="$store.cart.add(content)" class="w-full bg-brand-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-brand-700 transition-all flex items-center justify-center gap-2">
                            <span class="w-5 h-5" x-icon="'shopping-bag'"></span> Tambah Keranjang
                        </button>
                    </div>
                </div>
            </article>
        </template>

        <!-- B. LAYOUT: POST DETAIL -->
        <template x-if="page === 'post'">
            <article class="max-w-4xl mx-auto space-y-10">
                <div x-show="content.image" class="aspect-video bg-gray-50 dark:bg-gray-800 rounded-[2.5rem] overflow-hidden border border-gray-100 dark:border-gray-700 shadow-sm">
                    <img :src="content.image" class="w-full h-full object-cover">
                </div>
                <div class="space-y-4 text-center max-w-3xl mx-auto">
                    <span class="inline-flex items-center px-4 py-1.5 rounded-full bg-brand-50 text-brand-600 text-xs font-bold uppercase tracking-widest" x-text="content.category || 'News'"></span>
                    <h1 class="text-4xl md:text-5xl font-black text-gray-900 dark:text-white leading-tight" x-text="content.title"></h1>
                    <div class="flex items-center justify-center gap-4 text-gray-400 text-sm font-medium">
                        <span x-text="content.publishdate ? new Date(content.publishdate).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }) : 'Baru saja'"></span>
                        <span class="w-1.5 h-1.5 rounded-full bg-gray-200"></span>
                        <span>Artikel</span>
                    </div>
                </div>
                <div class="prose prose-lg dark:prose-invert max-w-3xl mx-auto px-4 md:px-0 leading-relaxed text-gray-600 dark:text-gray-300" x-html="content.description"></div>
                <div class="pt-10 border-t border-gray-100 dark:border-gray-800 flex justify-center">
                    <button @click="share()" class="flex items-center gap-2 bg-gray-50 dark:bg-gray-800 px-6 py-3 rounded-2xl text-brand-600 font-bold hover:bg-brand-50 transition-all">
                        <span class="w-5 h-5" x-icon="'share-2'"></span> Bagikan Berita
                    </button>
                </div>
            </article>
        </template>

        <!-- B. LAYOUT: GRID (Shop & Post List) -->
        <template x-if="page === 'shop' || page === 'post-list'">
            <div class="space-y-12">
                <!-- Header Filter -->
                <div class="flex flex-col md:flex-row justify-between items-end gap-6">
                    <div class="space-y-2">
                        <h1 class="text-4xl font-black text-gray-900 dark:text-white tracking-tight"
                            x-text="page === 'shop' ? 'Sparepart Katalog' : 'Update Otomotif'"></h1>
                        <p class="text-gray-500 font-medium"
                            x-text="page === 'shop' ? 'Koleksi lengkap komponen orisinal dengan jaminan kualitas terbaik.' : 'Wawasan terbaru, tips modifikasi, dan berita industri otomotif.'">
                        </p>
                    </div>
                    <div class="flex gap-4 w-full md:w-auto">
                        <div class="relative w-full md:w-72">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                <span class="w-4 h-4" x-icon="'search'"></span>
                            </span>
                            <input type="text" x-model="searchQuery" placeholder="Cari konten..."
                                class="pl-11 pr-4 py-3 rounded-2xl border border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 w-full focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all">
                        </div>
                    </div>
                </div>

                <!-- The Grid -->
                <div :class="page === 'shop' ? 'grid grid-cols-2 lg:grid-cols-4 gap-6' : 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8'">
                    <template x-for="item in filteredItems" :key="item.id">
                        <div @click="viewDetail(item)"
                            class="group cursor-pointer bg-white dark:bg-gray-800 rounded-[2rem] border border-gray-100 dark:border-gray-700 overflow-hidden hover:shadow-2xl hover:-translate-y-1 transition-all duration-300">
                            
                            <!-- Media: Square for Shop, Wide for Post -->
                            <div :class="page === 'shop' ? 'aspect-square p-6 bg-gray-50 dark:bg-gray-900/50' : 'aspect-video'">
                                <img :src="item.image"
                                    :class="page === 'shop' ? 'w-full h-full object-contain' : 'w-full h-full object-cover'"
                                    class="group-hover:scale-105 transition-transform duration-500">
                            </div>

                            <div class="p-6 space-y-3">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-black text-brand-600 uppercase tracking-widest" x-text="item.category"></span>
                                    <template x-if="page === 'post-list'">
                                        <span class="text-[10px] text-gray-400 font-bold">• ARTIKEL</span>
                                    </template>
                                </div>
                                <h3 :class="page === 'shop' ? 'text-sm' : 'text-lg'" 
                                    class="font-bold text-gray-900 dark:text-white line-clamp-2 leading-tight group-hover:text-brand-600 transition-colors"
                                    x-text="item.name || item.title"></h3>
                                
                                <template x-if="page === 'shop'">
                                    <div class="pt-2 flex items-center justify-between">
                                        <p class="text-lg font-black text-gray-900 dark:text-white" x-text="formatCurrency(item.price)"></p>
                                        <div class="w-8 h-8 rounded-full bg-brand-50 text-brand-600 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <span class="w-4 h-4" x-icon="'arrow-right'"></span>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="page === 'post-list'">
                                    <div class="flex items-center justify-between pt-2">
                                        <p class="text-xs text-gray-400 font-medium" x-text="item.publishdate ? new Date(item.publishdate).toLocaleDateString('id-ID') : ''"></p>
                                        <span class="text-xs font-bold text-brand-600">Baca Selengkapnya</span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
    function adaptiveController() {
        return {
            isLoading: true,
            error: false,
            content: {}, // Untuk detail
            collection: [], // Untuk list/grid
            searchQuery: '',
            selectedCategory: 'all',
            sortOrder: 'newest',

            async init() {
                this.isLoading = true;
                const page = window.app.page;
                const params = window.app.params;
                const slug = params.slug || params.id;

                try {
                    if (page === 'product' || page === 'post') {
                        await this.fetchDetail(page, slug);
                    } else {
                        await this.fetchCollection(page);
                    }
                    this.updateBreadcrumb();
                } catch (e) {
                    console.error('Initialization error:', e);
                    this.error = true;
                } finally {
                    this.isLoading = false;
                }
            },

            // LOGIKA NATIVE: Fetch dari Blogger Feed CDN
            async fetchCollection(pageType) {
                // [OPTIMIZED] Use Label Feed for Articles to speed up loading
                const feedPath = pageType === 'post-list' ? '/feeds/posts/default/-/Article?alt=json&max-results=150' : '/feeds/pages/default?alt=json&max-results=500';
                
                const res = await fetch(feedPath);
                if (!res.ok) throw new Error('Blogger Feed unreachable');
                const data = await res.json();

                let items = [];
                const parser = new DOMParser();

                if (data.feed && data.feed.entry) {
                    data.feed.entry.forEach(entry => {
                        const htmlContent = entry.content ? entry.content.$t : '';
                        const doc = parser.parseFromString(htmlContent, 'text/html');
                        // Detect via Selector (New Div or Old Script)
                        const metaNode = doc.querySelector('.ezy-meta');
                        let meta = null;

                        if (metaNode) {
                            try {
                                const rawData = metaNode.getAttribute('data-meta') || metaNode.textContent;
                                const cleanJson = rawData.replace(/&apos;/g, "'").replace(/&quot;/g, '"').replace(/&amp;/g, "&");
                                meta = JSON.parse(cleanJson);
                            } catch(e) {}
                        } else {
                            // Regex Fallback for truncated content
                            const divMatch = htmlContent.match(/<div[^>]*class=["']ezy-meta["'][^>]*data-meta=["'](.*?)["']/);
                            const scriptMatch = htmlContent.match(/<script[^>]*class=["']ezy-meta["'][^>]*>([\s\S]*?)<\/script>/);
                            
                            try {
                                if (divMatch && divMatch[1]) {
                                    const decoded = divMatch[1].replace(/&apos;/g, "'").replace(/&quot;/g, '"').replace(/&amp;/g, "&");
                                    meta = JSON.parse(decoded);
                                } else if (scriptMatch && scriptMatch[1]) {
                                    meta = JSON.parse(scriptMatch[1]);
                                }
                            } catch(e) {}
                        }

                        if (meta) {
                            const isProduct = meta.price !== undefined || meta._type === 'product';

                            // Filter berdasarkan tipe halaman
                            if ((pageType === 'shop' && isProduct) || (pageType === 'post-list' && !isProduct)) {
                                // Backup fields for legacy nodes
                                meta.id = meta.id || entry.id.$t;
                                meta.title = meta.title || meta.name || entry.title.$t;
                                meta.image = meta.image || meta.imageurl || '';

                                // Extract actual pathname
                                const linkNode = entry.link.find(l => l.rel === 'alternate');
                                if (linkNode) {
                                    meta.path = new URL(linkNode.href).pathname;
                                }

                                items.push(meta);
                            }
                        }
                    });
                }
                this.collection = items;
            },

            async fetchDetail(pageType, slug) {
                // 0. Cek Data Hand-off dari Pjax Router (Instant & Paling Akurat)
                // Hanya terima jika deskripsi sudah terisi (hasil Deep Extraction)
                if (window._lastResolvedMeta && (window._lastResolvedMeta.slug === slug || window._lastResolvedMeta.id === slug) && window._lastResolvedMeta.description) {
                    this.content = window._lastResolvedMeta;
                    window._lastResolvedMeta = null;
                    return;
                }

                // 1. Cek di DOM (Server-rendered content dalam wrapper baru)
                const bloggerMain = document.getElementById('blogger-main-container');
                const targetWrapper = document.getElementById('native-post-wrapper') || document.getElementById('native-product-wrapper') || bloggerMain;
                const localMetaNode = targetWrapper ? targetWrapper.querySelector('.ezy-meta') : document.querySelector('.ezy-meta');
                if (localMetaNode) {
                    try {
                        const rawData = localMetaNode.getAttribute('data-meta') || localMetaNode.textContent;
                        const cleanJson = rawData.replace(/&apos;/g, "'").replace(/&quot;/g, '"').replace(/&amp;/g, "&");
                        const data = JSON.parse(cleanJson);
                        if (data.slug === slug || data.id === slug) {
                            this.content = data;
                            return;
                        }
                    } catch(e) {}
                }

                // 2. Fallback: Cari di Feed CDN (Edge Cache)
                const feedPath = pageType === 'post' ? '/feeds/posts/default/-/Article?alt=json&max-results=150' : '/feeds/pages/default?alt=json&max-results=150';
                try {
                    const res = await fetch(feedPath);
                    const data = await res.json();
                    const entry = data.feed?.entry?.find(e => e.link.some(l => l.rel === 'alternate' && l.href.includes(slug)));

                    if (entry) {
                        const htmlContent = entry.content ? entry.content.$t : '';
                        
                        // Robust Parse: Try DOMParser first, then Regex if truncated
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(htmlContent, 'text/html');
                        const metaNode = doc.querySelector('.ezy-meta');
                        
                        if (metaNode) {
                            const rawData = metaNode.getAttribute('data-meta') || metaNode.textContent;
                            this.content = JSON.parse(rawData);
                        } else {
                            // Regex Fallback: Search for div data-meta or script tag
                            const divMatch = htmlContent.match(/<div[^>]*class=["']ezy-meta["'][^>]*data-meta=["'](.*?)["']/);
                            const scriptMatch = htmlContent.match(/<script[^>]*class=["']ezy-meta["'][^>]*>([\s\S]*?)<\/script>/);
                            
                            if (divMatch && divMatch[1]) {
                                // Decode HTML entities from attribute
                                const decoded = divMatch[1].replace(/&apos;/g, "'").replace(/&quot;/g, '"');
                                this.content = JSON.parse(decoded);
                            } else if (scriptMatch && scriptMatch[1]) {
                                this.content = JSON.parse(scriptMatch[1]);
                            }
                        }
                        if (this.content) return;
                    }
                } catch(e) { console.warn('Feed fetch failed'); }

                // 3. Last Resort: AdminAPI (Direct Server Call)
                const action = pageType === 'product' ? 'getProductDetail' : 'get_post_by_slug';
                const apiRes = await window.AdminAPI.get(action, { slug: slug });
                if (apiRes.status === 'success') {
                    this.content = apiRes.data;
                } else {
                    this.error = true;
                }
            },

            get filteredItems() {
                let list = [...this.collection];
                const q = this.searchQuery.toLowerCase();

                if (q) {
                    list = list.filter(i => (i.name || i.title || '').toLowerCase().includes(q));
                }

                // Tambahkan logika sorting jika diperlukan
                if (this.sortOrder === 'newest') {
                    list.sort((a, b) => new Date(b.publishdate || 0) - new Date(a.publishdate || 0));
                }
                return list;
            },

            viewDetail(item) {
                if (item.path) {
                    window.location.pathname = item.path;
                    return;
                }
                const type = (item.price !== undefined) ? 'product' : 'post';
                window.navigate(type, { slug: item.slug || item.id });
            },

            formatCurrency(val) {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(val);
            },

            updateBreadcrumb() {
                if (window.renderBreadcrumb) {
                    window.renderBreadcrumb(window.app.pageLabels[window.app.page]);
                }
            }
        }
    }
</script>
