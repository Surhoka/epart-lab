<div x-data="initPaymentPage()" x-init="init()" class="fade-in">
    <div class="max-w-7xl mx-auto px-4 lg:px-6 py-8">
        <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white mb-8">Checkout Pesanan</h1>

        <div x-show="$store.cart.items.length === 0" class="bg-white dark:bg-gray-800 rounded-3xl p-16 text-center shadow-sm border border-gray-100 dark:border-gray-700" x-cloak>
            <div class="w-24 h-24 bg-gray-50 dark:bg-gray-900 rounded-full flex items-center justify-center mx-auto mb-6 text-gray-300">
                <span class="w-12 h-12" x-icon="'shopping-bag'"></span>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Keranjang Anda Kosong</h2>
            <p class="text-gray-500 mb-8 max-w-sm mx-auto">Sepertinya Anda belum memilih produk apa pun. Silahkan kembali ke toko untuk mulai berbelanja.</p>
            <button @click="window.navigate('shop')" class="bg-brand-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-brand-700 transition-all active:scale-95">
                Mulai Belanja
            </button>
        </div>

        <div x-show="$store.cart.items.length > 0" class="grid lg:grid-cols-12 gap-8 items-start" x-cloak>
            <!-- Left: Order Summary -->
            <div class="lg:col-span-7 space-y-6">
                <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-gray-50 dark:border-gray-700/50 flex justify-between items-center">
                        <h2 class="text-lg font-black text-gray-900 dark:text-white uppercase tracking-wider">Ringkasan Pesanan</h2>
                        <span class="text-xs font-bold text-brand-600 bg-brand-50 dark:bg-brand-900/30 px-3 py-1 rounded-full" x-text="$store.cart.count + ' Barang'"></span>
                    </div>
                    
                    <div class="divide-y divide-gray-50 dark:divide-gray-700/50">
                        <template x-for="item in $store.cart.items" :key="item.id">
                            <div class="p-6 flex gap-4">
                                <div class="w-20 h-20 bg-gray-50 dark:bg-gray-900 rounded-xl border border-gray-100 dark:border-gray-700 flex-shrink-0 p-2">
                                    <img :src="item.imageurl" :alt="item.name" class="w-full h-full object-contain">
                                </div>
                                <div class="flex-1">
                                    <h3 class="font-bold text-gray-900 dark:text-white mb-1" x-text="item.name"></h3>
                                    <p class="text-brand-600 font-black text-sm mb-3" x-text="formatCurrency(item.price)"></p>
                                    
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden h-8">
                                            <button @click="$store.cart.updateQty(item.id, item.qty - 1)" class="px-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500">
                                                <span class="w-3.5 h-3.5" x-icon="'minus'"></span>
                                            </button>
                                            <span class="w-8 text-center text-xs font-bold text-gray-900 dark:text-white border-x border-gray-100 dark:border-gray-700" x-text="item.qty"></span>
                                            <button @click="$store.cart.add(item)" class="px-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500">
                                                <span class="w-3.5 h-3.5" x-icon="'plus'"></span>
                                            </button>
                                        </div>
                                        <button @click="$store.cart.remove(item.id)" class="text-red-500 hover:text-red-600 font-bold text-xs uppercase tracking-widest flex items-center gap-1.5 transition-colors">
                                            <span class="w-3.5 h-3.5" x-icon="'trash-2'"></span>
                                            Hapus
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div class="p-6 bg-gray-50 dark:bg-gray-900/30 space-y-3">
                        <div class="flex justify-between text-gray-500 dark:text-gray-400">
                            <span class="text-sm">Subtotal</span>
                            <span class="font-bold" x-text="formatCurrency($store.cart.total)"></span>
                        </div>
                        <div class="flex justify-between text-gray-500 dark:text-gray-400">
                            <span class="text-sm">Biaya Pengiriman</span>
                            <span class="font-bold text-green-500">Dihitung otomatis</span>
                        </div>
                        <div class="pt-3 border-t border-gray-200 dark:border-gray-700 flex justify-between items-center">
                            <span class="font-black text-gray-900 dark:text-white uppercase tracking-widest text-sm">Total Tagihan</span>
                            <span class="text-2xl font-black text-brand-600" x-text="formatCurrency($store.cart.total)"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Customer Form & Payment -->
            <div class="lg:col-span-5 space-y-6">
                <!-- Customer Info -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm p-6 space-y-6">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-8 h-8 bg-brand-500 text-white rounded-lg flex items-center justify-center">
                            <span class="w-4 h-4" x-icon="'user'"></span>
                        </div>
                        <h2 class="font-black text-gray-900 dark:text-white uppercase tracking-wider">Data Pengiriman</h2>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1.5">Nama Lengkap</label>
                            <input type="text" x-model="form.name" placeholder="Contoh: Budi Santoso" class="w-full bg-gray-50 dark:bg-gray-900 border-gray-100 dark:border-gray-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1.5">WhatsApp / No. Telp</label>
                            <input type="tel" x-model="form.phone" placeholder="Contoh: 0812XXXXXXXX" class="w-full bg-gray-50 dark:bg-gray-900 border-gray-100 dark:border-gray-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1.5">Alamat Lengkap</label>
                            <textarea x-model="form.address" rows="3" placeholder="Jl. Raya No. 123, Kota..." class="w-full bg-gray-50 dark:bg-gray-900 border-gray-100 dark:border-gray-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all outline-none"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Payment Method -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm p-6 space-y-6">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-8 h-8 bg-brand-500 text-white rounded-lg flex items-center justify-center">
                            <span class="w-4 h-4" x-icon="'credit-card'"></span>
                        </div>
                        <h2 class="font-black text-gray-900 dark:text-white uppercase tracking-wider">Metode Pembayaran</h2>
                    </div>

                    <div class="space-y-3">
                        <template x-for="method in paymentMethods" :key="method.id">
                            <label :class="form.paymentMethod === method.id ? 'border-brand-500 bg-brand-50/30 dark:bg-brand-900/20' : 'border-gray-100 dark:border-gray-700 hover:border-gray-200'" class="flex items-center gap-4 p-4 border rounded-xl cursor-pointer transition-all active:scale-[0.98]">
                                <input type="radio" :value="method.id" x-model="form.paymentMethod" class="hidden">
                                <div class="w-10 h-10 bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 flex items-center justify-center text-brand-600">
                                    <span class="w-5 h-5" x-icon="method.id.includes('midtrans') ? 'credit-card' : 'bank'"></span>
                                </div>
                                <div class="flex-1">
                                    <p class="text-sm font-bold text-gray-900 dark:text-white" x-text="method.label || method.bankname"></p>
                                    <p class="text-[10px] text-gray-400 uppercase tracking-widest" x-text="method.id.includes('midtrans') ? 'Otomatis' : 'Konfirmasi Manual'"></p>
                                </div>
                                <div class="w-5 h-5 rounded-full border-2 border-gray-200 dark:border-gray-700 flex items-center justify-center transition-all" :class="form.paymentMethod === method.id ? 'border-brand-500 bg-brand-500' : ''">
                                    <template x-if="form.paymentMethod === method.id">
                                        <span class="w-2.5 h-2.5 text-white" x-icon="'check'"></span>
                                    </template>
                                </div>
                            </label>
                        </template>
                    </div>

                    <button @click="submitOrder()" :disabled="isSubmitting" class="w-full bg-brand-600 hover:bg-brand-700 disabled:bg-gray-400 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-brand-500/20 transition-all flex items-center justify-center gap-3 active:scale-95 group">
                        <template x-if="!isSubmitting">
                            <div class="flex items-center gap-3">
                                <span class="w-6 h-6 transform group-hover:translate-x-1 transition-transform" x-icon="'arrow-right'"></span>
                                Konfirmasi & Bayar
                            </div>
                        </template>
                        <template x-if="isSubmitting">
                            <div class="flex items-center gap-2">
                                <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                                Memproses...
                            </div>
                        </template>
                    </button>
                    
                    <p class="text-[10px] text-center text-gray-400 dark:text-gray-500 uppercase tracking-widest">Aman & Terenkripsi oleh EzyStore Gateway</p>
                </div>
            </div>
        </div>
    </div>
</div>
