<div x-data="initProductPage()" x-init="init()" class="max-w-7xl mx-auto px-4 lg:px-6 py-8 animate-fade-in shadow-theme-xs bg-white dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700">

    <!-- LOADING STATE -->
    <div x-show="isLoading" class="flex flex-col items-center justify-center py-32 space-y-4">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-500"></div>
        <p class="text-sm font-medium text-gray-500 animate-pulse">Memuat detail produk...</p>
    </div>

    <!-- ERROR STATE -->
    <div x-show="!isLoading && error" class="text-center py-20">
        <div class="w-20 h-20 bg-red-50 dark:bg-red-900/10 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="w-10 h-10 text-red-500" x-icon="'alert-circle'"></span>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Produk Tidak Ditemukan</h2>
        <button @click="window.navigate('shop')" class="mt-4 bg-brand-500 text-white px-8 py-3 rounded-xl font-bold active:scale-95 transition-all">Kembali ke Katalog</button>
    </div>

    <!-- PRODUCT DETAIL -->
    <div x-show="!isLoading && !error" x-cloak>
        <article class="grid lg:grid-cols-2 gap-10 items-start">
            <div class="relative aspect-square bg-gray-50 dark:bg-gray-900/50 rounded-3xl overflow-hidden border border-gray-100 dark:border-gray-700">
                <img :src="content.image || content.imageurl || content.imageUrl" class="w-full h-full object-contain p-4" :alt="content.name || content.title">
            </div>
            
            <div class="space-y-6">
                <div class="space-y-2">
                    <span class="text-[10px] font-black uppercase tracking-widest text-brand-600" x-text="content.category"></span>
                    <h1 class="text-4xl font-extrabold text-gray-900 dark:text-white leading-tight" x-text="content.name || content.title"></h1>
                    
                    <div class="flex items-center gap-4 pt-4">
                        <span class="text-3xl font-black text-brand-600" x-text="formatCurrency(content.price)"></span>
                        <span class="text-lg text-gray-400 line-through" x-show="content.originalPrice > content.price" x-text="formatCurrency(content.originalPrice)"></span>
                    </div>
                </div>

                <div class="prose dark:prose-invert max-w-none text-gray-600 dark:text-gray-300" x-html="content.description"></div>

                <div class="pt-6 border-t border-gray-100 dark:border-gray-800">
                    <button @click="$store.cart.add(content)" class="w-full bg-brand-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-brand-700 transition-all flex items-center justify-center gap-2 group">
                        <span class="w-5 h-5 group-hover:scale-110 transition-transform" x-icon="'shopping-bag'"></span> 
                        Tambah ke Keranjang
                    </button>
                </div>
            </div>
        </article>
    </div>

</div>

<script>
function initProductPage() {
    return {
        isLoading: true,
        error: false,
        content: {},

        async init() {
            const params = window.app.params;
            const slug = params.slug || params.id;
            
            if (!slug) {
                this.error = true;
                this.isLoading = false;
                return;
            }

            try {
                // 1. Cek Data Hand-off (Instant)
                if (window._lastResolvedMeta && (window._lastResolvedMeta.slug === slug || window._lastResolvedMeta.id === slug)) {
                    this.content = window._lastResolvedMeta;
                    window._lastResolvedMeta = null;
                } else {
                    let itemFound = null;
                    
                    // 2. Fetch via Blogger CDN dengan DOMParser
                    try {
                        const res = await fetch(`/feeds/pages/default?q=${encodeURIComponent(slug)}&alt=json`);
                        if (res.ok) {
                            const data = await res.json();
                            if (data.feed && data.feed.entry) {
                                const parser = new DOMParser();
                                for (const entry of data.feed.entry) {
                                    const html = entry.content ? entry.content.$t : '';
                                    const doc = parser.parseFromString(html, 'text/html');
                                    const metaNode = doc.querySelector('.ezy-meta');
                                    let meta = null;

                                    if (metaNode) {
                                        try {
                                            const rawData = metaNode.getAttribute('data-meta') || metaNode.textContent;
                                            meta = JSON.parse(rawData);
                                        } catch(e) {}
                                    } else {
                                        const divMatch = html.match(/<div[^>]*class=["']ezy-meta["'][^>]*data-meta=(['"])([\s\S]*?)\1/);
                                        const scriptMatch = html.match(/<script[^>]*class=["']ezy-meta["'][^>]*>([\s\S]*?)<\/script>/);
                                        try {
                                            if (divMatch && divMatch[2]) {
                                                const decoded = divMatch[2].replace(/&apos;/g, "'").replace(/&quot;/g, '"');
                                                meta = JSON.parse(decoded);
                                            } else if (scriptMatch && scriptMatch[1]) {
                                                meta = JSON.parse(scriptMatch[1]);
                                            }
                                        } catch(e) {}
                                    }

                                    if (meta && (meta.slug === slug || meta.id === slug)) {
                                        itemFound = meta;
                                        break;
                                    }
                                }
                            }
                        }
                    } catch(e) {}

                    if (itemFound) {
                        this.content = itemFound;
                    } else {
                        // 3. Fetch via AdminAPI
                        const res = await window.AdminAPI.get('getProductDetail', { slug: slug });
                        if (res.status === 'success') {
                            this.content = res.data;
                        } else {
                            throw new Error('Product not found');
                        }
                    }
                }
                this.updateBreadcrumb();
            } catch (e) {
                console.error('Product load error:', e);
                this.error = true;
            } finally {
                this.isLoading = false;
            }
        },

        formatCurrency(val) {
            if (!val && val !== 0) return '-';
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(val);
        },

        updateBreadcrumb() {
            if (window.renderBreadcrumb) {
                window.renderBreadcrumb([
                    { label: 'Home', link: '/' },
                    { label: 'Shop', action: "window.navigate('shop')" },
                    { label: this.content.name || 'Produk' }
                ]);
            }
        }
    }
}
</script>
